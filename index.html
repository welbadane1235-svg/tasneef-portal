<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>تسجيل الدخول - تصنيف</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#0A4033;--bg:#eef6f3;--card:#fff;--line:#dce6e2;--text:#10231d;--muted:#60706a;--red:#b83232}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 15% 15%,#e8f3ef,transparent 35%),linear-gradient(180deg,#eef6f3,#f8fbfa);font-family:Tahoma,Arial,sans-serif;color:var(--text)}
.login-card{width:min(440px,92vw);background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 18px 44px rgba(0,0,0,.08);text-align:center}
.logo{width:58px;height:58px;border-radius:16px;background:var(--brand);color:#fff;display:grid;place-items:center;margin:0 auto 12px;font-size:26px;font-weight:900}
h1{margin:0 0 8px;color:#071d35;font-size:28px}p{margin:0 0 18px;color:var(--muted)}label{display:block;margin:12px 0 6px;color:var(--brand);font-weight:700;font-size:13px;text-align:right}
input{width:100%;border:1px solid #cbdcd6;border-radius:10px;padding:12px;background:#eef4ff;font-family:inherit;text-align:right}button{width:100%;border:0;border-radius:10px;background:var(--brand);color:#fff;padding:12px;font-weight:800;font-family:inherit;margin-top:14px;cursor:pointer}
.msg{margin-top:14px;border:1px solid #cfe5dc;background:#effaf6;color:var(--brand);padding:10px;border-radius:10px;font-weight:700}.msg.err{border-color:#f0caca;background:#fff1f1;color:var(--red)}.hidden{display:none!important}.small{font-size:12px;color:var(--muted);margin-top:16px}
</style>
</head>
<body>
<main class="login-card">
<div class="logo">ت</div><h1>نظام تصنيف للتشغيل</h1><p>تسجيل دخول الإدارة والمشرفين والفنيين</p>
<label for="loginUsername">اسم المستخدم</label><input id="loginUsername" autocomplete="username" placeholder="مثال: admin أو fahad">
<label for="loginPassword">كلمة المرور</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button><div id="loginMsg" class="msg hidden"></div><div class="small">V10818 - جلسة بيانات موحدة وآمنة</div>
</main>
<script>
(async function(){try{localStorage.removeItem('tasneef_force_domain');sessionStorage.removeItem('tasneef_force_domain');if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs) await r.unregister();}if(window.caches && location.protocol !== 'file:'){const keys=await caches.keys();for(const k of keys) await caches.delete(k);}}catch(e){}})();
document.addEventListener('keydown', function(e){ if(e.key === 'Enter') login(); });
</script>
<script src="app.js?v=10822-role-routing-role-check"></script>
<script defer src="tasneef_permissions_v10817.js?v=10822-role-routing-role-check"></script>
</body>
</html>
