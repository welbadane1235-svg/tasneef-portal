<!doctype html><html lang='ar' dir='rtl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>تنظيف كاش تصنيف</title><style>body{font-family:Tahoma,Arial;background:#f2f7f5;color:#073f35;display:grid;place-items:center;min-height:100vh}.box{background:white;border:1px solid #d8e7e2;border-radius:24px;padding:28px;max-width:560px;text-align:center;box-shadow:0 20px 50px #0001}button,a{display:inline-block;border:0;background:#064c3f;color:white;padding:12px 20px;border-radius:12px;text-decoration:none;font-weight:800;margin:8px}.muted{color:#60736c;line-height:1.8}</style></head><body><div class='box'><h1>تنظيف كاش نظام تصنيف</h1><p class='muted'>هذا يحذف أي تحويل قديم للدومين tasneef-fm.com ويلغي Service Worker والكاش القديم.</p><button onclick='clean()'>تنظيف الكاش الآن</button><a href='index.html?v=403'>فتح تسجيل الدخول</a><pre id='out'></pre></div><script>async function clean(){const out=document.getElementById('out');try{localStorage.clear();
      localStorage.setItem("tasneef_version","403-quick-distribution");sessionStorage.clear();if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs) await r.unregister();}if(window.caches && location.protocol !== 'file:'){const keys=await caches.keys();for(const k of keys) await caches.delete(k);}out.textContent='تم التنظيف بنجاح... سيتم فتح تسجيل الدخول';setTimeout(()=>location.href='index.html?v=403&nocache='+Date.now(),800)}catch(e){out.textContent='حدث خطأ: '+(e.message||e)}};</script></body></html>
