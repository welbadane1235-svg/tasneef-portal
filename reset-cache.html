<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تحديث ملفات نظام تصنيف</title>
  <style>
    body{font-family:Tahoma,Arial;background:#f2f7f5;color:#073f35;display:grid;place-items:center;min-height:100vh;margin:0}
    .box{background:white;border:1px solid #d8e7e2;border-radius:24px;padding:28px;max-width:600px;text-align:center;box-shadow:0 20px 50px #0001}
    button,a{display:inline-block;border:0;background:#064c3f;color:white;padding:12px 20px;border-radius:12px;text-decoration:none;font-weight:800;margin:8px;cursor:pointer}
    .muted{color:#60736c;line-height:1.8}pre{white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="box">
    <h1>تحديث ملفات نظام تصنيف</h1>
    <p class="muted">يلغي Service Worker وكاش ملفات الموقع فقط. لا يحذف بيانات النظام أو إعدادات المستخدم المحفوظة.</p>
    <button onclick="clean()">تحديث الملفات الآن</button>
    <a href="index.html?v=10801-crm-customer-name-fix">فتح تسجيل الدخول</a>
    <pre id="out"></pre>
  </div>
  <script>
    async function clean(){
      const out=document.getElementById('out');
      try{
        try{localStorage.setItem('tasneef_version','10801-crm-inspection-stage-fix');localStorage.setItem('tasneef_build_version','V10801-CRM-INSPECTION-STAGE-FIX');}catch(_){ }
        if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.unregister();}
        if(window.caches&&location.protocol!=='file:'){const keys=await caches.keys();for(const k of keys)await caches.delete(k);}
        out.textContent='تم تحديث الملفات بنجاح دون حذف بياناتك. سيتم فتح تسجيل الدخول.';
        setTimeout(()=>location.href='index.html?v=10801-crm-customer-name-fix&nocache='+Date.now(),700);
      }catch(e){out.textContent='حدث خطأ: '+(e.message||e);}
    }
  </script>
<script>try{localStorage.setItem("tasneef_build_marker","V10801-crm-inspection-stage-fix");}catch(e){}</script></body>
</html>
