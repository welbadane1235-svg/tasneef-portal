<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة العميل المختصرة - شركة تصنيف</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<style>body{margin:0;font-family:Tahoma,Arial;background:#eef5f2;color:#0A4033;display:grid;place-items:center;min-height:100vh}.card{background:#fff;border:1px solid #dce7e2;border-radius:24px;padding:28px;box-shadow:0 18px 50px rgba(10,64,51,.14);text-align:center;width:min(460px,92vw)}.spin{width:42px;height:42px;border:4px solid #dce7e2;border-top-color:#0A4033;border-radius:50%;margin:18px auto;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}a{color:#0A4033;font-weight:bold}</style>
</head>
<body>
<div class="card"><h2>جاري فتح بوابة المشروع</h2><p>يرجى الانتظار...</p><div class="spin"></div><p><a id="manual" href="client-report.html">فتح يدويًا</a></p></div>
<script>
(function(){
  var q=new URLSearchParams(location.search);
  var token=q.get('token')||q.get('t')||q.get('project_token')||'';
  var project=q.get('project_id')||q.get('id')||q.get('p')||'';
  var url='client-report.html';
  if(token) url+='?token='+encodeURIComponent(token);
  else if(project) url+='?project_id='+encodeURIComponent(project);
  document.getElementById('manual').href=url;
  location.replace(url);
})();
</script>
</body>
</html>
