<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تقرير عميل - تصنيف لإدارة المرافق</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#075f37;--brand2:#0b8d4b;--soft:#eef8f2;--line:#dce9e1;--text:#10231d;--muted:#68766f;--bg:#f7faf8}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at 10% 0%,#eaf8ef,transparent 30%),var(--bg);color:var(--text)}.topbar{height:78px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:5}.brand{display:flex;align-items:center;gap:12px;color:var(--brand);font-weight:900}.logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:grid;place-items:center;font-size:24px;font-weight:900}.brand small{display:block;color:var(--muted);font-weight:700}.access{display:flex;align-items:center;gap:8px;color:var(--brand);font-weight:800}.page{max-width:1240px;margin:24px auto;padding:0 18px;display:grid;grid-template-columns:1fr 280px;gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 28px rgba(7,95,55,.06);padding:20px;margin-bottom:16px}.hero{padding:28px}.crumb{color:var(--muted);font-size:13px;margin-bottom:12px}.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.title-row h1{margin:0;color:var(--brand);font-size:34px}.approved{display:inline-flex;align-items:center;gap:8px;background:#e5f6ec;color:var(--brand);border-radius:999px;padding:8px 14px;font-weight:900}.meta{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-top:22px}.meta-item{padding:16px;text-align:center;border-left:1px solid var(--line);background:#fbfdfc}.meta-item:last-child{border-left:0}.icon{width:52px;height:52px;margin:0 auto 8px;border-radius:50%;display:grid;place-items:center;background:#eaf6ef;color:var(--brand);font-size:22px}.meta-item small{display:block;color:var(--muted);margin-bottom:4px}.meta-item b{color:var(--brand)}.section-title{display:flex;align-items:center;gap:10px;color:var(--brand);font-size:20px;margin:0 0 12px}.section-icon{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:22px}.summary{line-height:2;text-align:right}.works{display:grid;gap:10px}.work{display:flex;align-items:center;gap:10px;line-height:1.8}.check{width:22px;height:22px;border-radius:50%;background:var(--brand2);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:900;flex:0 0 auto}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.photo{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}.photo b{display:block;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;text-align:center;padding:8px}.photo img{width:100%;height:210px;object-fit:cover;display:block;cursor:pointer}.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}.thumbs img{height:48px;border-radius:8px;object-fit:cover;width:100%;cursor:pointer}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.btn{border:0;border-radius:13px;padding:13px 16px;font-family:inherit;font-weight:900;cursor:pointer;background:var(--brand);color:#fff;text-align:center;text-decoration:none}.btn.light{background:#fff;color:var(--brand);border:1px solid var(--brand)}.side-card h3{margin:0 0 16px;color:var(--brand)}.info-list{display:grid;gap:16px;text-align:center}.info-list small{display:block;color:var(--muted);margin-bottom:6px}.info-list b{font-size:17px}.support{font-size:26px;color:var(--brand);font-weight:900;text-align:center}.footer{text-align:center;color:var(--muted);padding:12px 0 28px}.notice{background:#eaf8ef;color:var(--brand);border:1px solid #cfe7d8;border-radius:14px;padding:13px;text-align:center;font-weight:800}.empty{max-width:560px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:22px;padding:32px;text-align:center;box-shadow:0 10px 28px rgba(7,95,55,.06)}.empty h1{color:var(--brand)}.building{height:120px;border-radius:18px;background:linear-gradient(180deg,#f4fbf6,#e9f8ee);display:grid;place-items:center;color:var(--brand);font-size:54px}@media(max-width:900px){.topbar{padding:0 14px}.page{display:block;margin-top:14px}.title-row h1{font-size:25px}.meta{grid-template-columns:repeat(2,1fr)}.photo-grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.photo img{height:230px}}@media print{.topbar,.actions,.side{display:none}.page{display:block;max-width:none}.card{box-shadow:none;break-inside:avoid}.photo img{height:170px}body{background:#fff}}
</style>
</head>
<body>
<div class="topbar"><div class="access">🔒 رؤساء الجمعية فقط</div><div class="brand"><div><b>تصنيف</b><small>لإدارة المرافق</small></div><div class="logo">ت</div></div></div>
<div id="app"><div class="empty"><h1>جاري تحميل التقرير...</h1><p>يرجى الانتظار لحظات</p></div></div>
<script>
const SUPABASE_URL = "https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));
const qs=new URLSearchParams(location.search);
function fmtDate(d){ if(!d) return '-'; try{return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;} }
function reportUrl(){ return location.href; }
function cleanPhone(p){ p=String(p||'').replace(/[^0-9]/g,''); if(p.startsWith('05')) p='966'+p.slice(1); if(p.startsWith('5')) p='966'+p; return p; }
function unavailable(){ document.getElementById('app').innerHTML='<div class="empty"><h1>هذا التقرير غير متاح حاليًا</h1><p>قد يكون التقرير غير معتمد أو تم إلغاء نشره من الإدارة.</p></div>'; }
function shareWhatsApp(r){ const text=`السيد / رئيس جمعية ${r.project_name||''} المحترم\n\nتم نشر ${r.title||'التقرير'} ويمكنكم الاطلاع عليه من خلال الرابط التالي:\n${reportUrl()}\n\nشركة تصنيف لإدارة المرافق\n920015589`; window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'); }
function render(r){
  const imgs=Array.isArray(r.images)?r.images:[];
  const main=imgs.slice(0,3);
  const labels=['قبل التنفيذ','أثناء التنفيذ','بعد التنفيذ'];
  const works=Array.isArray(r.works)?r.works:[];
  document.title=(r.title||'تقرير عميل')+' - تصنيف';
  document.getElementById('app').innerHTML=`
  <div class="page">
    <main>
      <section class="card hero">
        <div class="crumb">التقارير / ${esc(r.report_type)} / ${esc(r.project_name)}</div>
        <div class="title-row"><h1>${esc(r.title||('تقرير '+r.report_type))}</h1><span class="approved">✓ معتمد</span></div>
        <p style="color:var(--muted);margin:8px 0 0">${esc(r.project_name||'')}</p>
        <div class="meta">
          <div class="meta-item"><div class="icon">🪲</div><small>نوع الخدمة</small><b>${esc(r.report_type||'-')}</b></div>
          <div class="meta-item"><div class="icon">📅</div><small>تاريخ التنفيذ</small><b>${esc(r.execution_date||'-')}</b></div>
          <div class="meta-item"><div class="icon">📍</div><small>الموقع</small><b>${esc(r.location_text||'المرافق المشتركة')}</b></div>
          <div class="meta-item"><div class="icon">👷</div><small>المشرف</small><b>${esc(r.supervisor_name||'-')}</b></div>
        </div>
      </section>
      <section class="card"><h2 class="section-title"><span class="section-icon">📋</span>ملخص التنفيذ</h2><div class="summary">${esc(r.summary||'تم تنفيذ الخدمة حسب الخطة التشغيلية المعتمدة.').replace(/\n/g,'<br>')}</div></section>
      <section class="card"><h2 class="section-title"><span class="section-icon">✓</span>الأعمال المنفذة</h2><div class="works">${works.map(w=>`<div class="work"><span class="check">✓</span><span>${esc(w)}</span></div>`).join('')||'<div class="work">لا توجد بنود مسجلة</div>'}</div></section>
      <section class="card"><h2 class="section-title"><span class="section-icon">🖼️</span>صور التقرير</h2><div class="photo-grid">${main.map((im,i)=>`<div class="photo"><b>${labels[i]||('صورة '+(i+1))}</b><img src="${im.dataUrl}" onclick="window.open(this.src,'_blank')"></div>`).join('')||'<p>لا توجد صور مرفقة</p>'}</div>${imgs.length>3?`<div class="thumbs">${imgs.slice(3).map(im=>`<img src="${im.dataUrl}" onclick="window.open(this.src,'_blank')">`).join('')}</div>`:''}</section>
      <section class="card"><h2 class="section-title"><span class="section-icon">📝</span>ملاحظات الفريق</h2><div class="summary">${esc(r.notes||'لا توجد ملاحظات مؤثرة، وتم تنفيذ الخدمة بنجاح.')}</div></section>
      <section class="card"><div class="actions"><button class="btn" onclick="window.print()">تحميل PDF</button><button class="btn" onclick='shareWhatsApp(${JSON.stringify({project_name:r.project_name,title:r.title}).replace(/'/g,"&#39;")})'>مشاركة التقرير</button><button class="btn light" onclick="window.print()">طباعة التقرير</button></div></section>
      <div class="notice">تم اعتماد التقرير من الإدارة ونشره بتاريخ ${fmtDate((r.published_at||'').slice(0,10))}</div>
    </main>
    <aside class="side">
      <div class="card side-card"><h3>معلومات التقرير</h3><div class="info-list"><div><small>رقم التقرير</small><b>${esc(r.report_number||'-')}</b></div><div><small>تاريخ النشر</small><b>${fmtDate((r.published_at||'').slice(0,10))}</b></div><div><small>حالة التقرير</small><b style="color:var(--brand)">معتمد ومنشور</b></div></div></div>
      <div class="card side-card"><h3>للتواصل والدعم</h3><div class="support">920015589</div></div>
      <div class="card"><div class="building">▥</div></div>
    </aside>
  </div><div class="footer">جميع الحقوق محفوظة © 2026 تصنيف لإدارة المرافق</div>`;
}
async function load(){
  const token=qs.get('token'); if(!token) return unavailable();
  const {data,error}=await sb.from('service_reports').select('*').eq('public_token',token).eq('status','published').maybeSingle();
  if(error||!data) return unavailable(); render(data);
}
load();
</script>
</body>
</html>
