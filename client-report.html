<html lang="ar" dir="rtl">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#0A4033;--brand2:#0f5a47;--bg:#f3f6f5;--card:#fff;--line:#dce6e2;--text:#10231d;--muted:#60706a;--red:#b83232;--green:#137a4b;--amber:#9a6b00}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#eaf4f0,#f7fbfa);color:var(--text)}button{font-family:inherit;border:0;background:var(--brand);color:#fff;border-radius:12px;padding:11px 15px;font-weight:700;cursor:pointer}button.light{background:#eef6f3;color:var(--brand);border:1px solid var(--line)}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff;font-family:inherit}.container{width:min(1180px,94vw);margin:auto}.cover{margin:22px auto;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(10,64,51,.18);position:relative;overflow:hidden}.cover:before{content:"";position:absolute;inset:auto -80px -120px auto;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.08)}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;position:relative}.logo{display:flex;gap:12px;align-items:center}.logo-mark{width:58px;height:58px;border-radius:18px;background:#fff;color:var(--brand);display:grid;place-items:center;font-size:28px;font-weight:900}.logo small,.cover p{color:#e6f5ef}.cover h1{font-size:32px;margin:22px 0 8px}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px;position:relative}.meta div{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:12px;border-radius:16px}.meta small{display:block;color:#cfe9df;margin-bottom:5px}.actions{display:flex;gap:8px;flex-wrap:wrap}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin:16px 0;box-shadow:0 10px 28px rgba(10,64,51,.06)}.card h2{margin:0 0 14px;color:var(--brand)}.summary{font-size:17px;line-height:1.9}.service-gates{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gate{background:#fbfdfc;border:1px solid var(--line);border-radius:20px;padding:16px;cursor:pointer;transition:.2s}.gate:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(10,64,51,.08)}.gate-icon{width:46px;height:46px;border-radius:16px;background:#e8f4ee;color:var(--brand);display:grid;place-items:center;font-size:22px;margin-bottom:10px}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8f4ee;color:var(--brand);font-size:12px;font-weight:700}.service-section{scroll-margin-top:16px}.service-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.scope{background:#f7fbfa;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.8;color:#31443d}.stages{display:grid;grid-template-columns:1fr;gap:18px;margin-top:16px}.stage{border:1px solid var(--line);border-radius:22px;padding:16px;background:linear-gradient(180deg,#fff,#fbfdfc)}.stage h3{color:var(--brand);margin:0}.stage-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.stage-count{background:#e8f4ee;color:var(--brand);border-radius:999px;padding:6px 10px;font-weight:800;font-size:12px}.images{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.img-card{position:relative;border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden;cursor:pointer;box-shadow:0 8px 22px rgba(10,64,51,.07)}.img-card img{width:100%;height:260px;object-fit:contain;background:#f7faf9;display:block}.img-caption{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;color:#52625d;font-size:12px;background:#fff}.img-no{background:#0A4033;color:#fff;border-radius:999px;padding:3px 8px;font-weight:800}.compare{display:grid;grid-template-columns:1fr 1fr;gap:14px}.compare .img-card img{height:300px}.timeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.step{background:#fbfdfc;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.step b{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;margin:0 auto 8px}.rating-box{background:#f7fbfa;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:16px}.rating-buttons{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.rating-buttons button{background:#fff;color:var(--brand);border:1px solid var(--line)}.rating-buttons button.active{background:var(--brand);color:#fff}.footer{text-align:center;color:var(--muted);padding:26px}.reveal{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}.reveal.show{opacity:1;transform:none}.service-focus{animation:softPulse 1.2s ease}.back-gates{margin-top:12px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:18px;z-index:999;backdrop-filter:blur(4px)}.modal.open{display:flex;animation:fadeIn .22s ease}.modal-panel{width:min(1120px,94vw);height:min(88vh,860px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}.modal img{max-width:100%;max-height:calc(88vh - 92px);object-fit:contain;background:#fff;border-radius:18px;box-shadow:0 20px 70px rgba(0,0,0,.35);animation:zoomIn .25s ease}.modal-info{width:100%;display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:800}.modal-info .badge{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22)}.modal-dots{display:flex;gap:7px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:18px}.modal-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:.2s}.modal-dot.active{width:23px;border-radius:999px;background:#fff}.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:64px;border-radius:18px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:42px;line-height:1;padding:0}.nav-arrow:hover,.close:hover{background:#fff;color:#111}.nav-prev{right:18px}.nav-next{left:18px}.close{position:absolute;top:18px;left:18px;background:#fff;color:#111;z-index:3}.service-modal{position:fixed;inset:0;background:rgba(7,28,22,.68);display:none;align-items:center;justify-content:center;padding:18px;z-index:850;backdrop-filter:blur(8px)}.service-modal.open{display:flex;animation:fadeIn .22s ease}.service-modal-card{width:min(1080px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;border:1px solid rgba(255,255,255,.4);box-shadow:0 30px 90px rgba(0,0,0,.28);animation:serviceSlide .28s ease}.service-modal-head{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 22px;border-radius:28px 28px 0 0;display:flex;justify-content:space-between;align-items:center;gap:12px}.service-modal-head h2{margin:0;color:#fff}.service-modal-head small{color:#d9f1e8}.service-modal-close{background:#fff;color:var(--brand);border-radius:12px}.service-modal-body{padding:20px}.service-modal-body .reveal{opacity:1;transform:none}.service-modal-body .service-section{margin:0;box-shadow:none;border:0;padding:0}.service-modal-body .service-head{background:#f7fbfa;border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:14px}.modal-service-note{background:#eef7f3;color:var(--brand);border:1px solid #cfe5dc;border-radius:16px;padding:12px;margin-bottom:14px;line-height:1.8}.gate small{color:var(--muted)}@keyframes serviceSlide{from{opacity:0;transform:translateY(24px) scale(.985)}to{opacity:1;transform:none}}.loading{min-height:80vh;display:grid;place-items:center;text-align:center}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes zoomIn{from{opacity:.75;transform:scale(.96)}to{opacity:1;transform:scale(1)}}@keyframes softPulse{0%{box-shadow:0 0 0 rgba(10,64,51,0)}35%{box-shadow:0 0 0 7px rgba(10,64,51,.12)}100%{box-shadow:0 10px 28px rgba(10,64,51,.06)}}.img-card{transition:transform .22s ease,box-shadow .22s ease}.img-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(10,64,51,.13)}.err{background:#fde8e8;color:#9d2222;border:1px solid #efc3c3;border-radius:18px;padding:18px}.print-only{display:none}@media(max-width:900px){.topbar,.service-head{display:block}.meta,.service-gates,.stages,.timeline,.compare{grid-template-columns:1fr}.images{grid-template-columns:1fr}.cover h1{font-size:25px}.actions{margin-top:14px}.img-card img,.compare .img-card img{height:auto;max-height:620px}.nav-arrow{width:42px;height:54px;font-size:34px}.nav-prev{right:8px}.nav-next{left:8px}.modal-panel{width:96vw}}@media print{body{background:#fff}.actions,.rating-box{display:none}.cover,.card{box-shadow:none}.container{width:100%;}.print-only{display:block}.img-card img{height:auto;max-height:400px}.stage,.service-section{break-inside:avoid}}
</style>
</head>
<body onload="loadClientReport()">
<div id="app" class="container loading"><div><h2>جاري تحميل التقرير...</h2><p>شركة تصنيف لإدارة المرافق</p></div></div>
<div id="imgModal" class="modal" onclick="modalBackdropClose(event)">
  <button class="close" onclick="closeGallery(event)">إغلاق</button>
  <button class="nav-arrow nav-prev" onclick="moveGallery(-1,event)" aria-label="السابق">‹</button>
  <div class="modal-panel">
    <div class="modal-info"><span id="modalStage" class="badge">صورة</span><span id="modalCounter">1 / 1</span></div>
    <img id="modalImg" alt="صورة التقرير">
    <div id="modalDots" class="modal-dots"></div>
  </div>
  <button class="nav-arrow nav-next" onclick="moveGallery(1,event)" aria-label="التالي">›</button>
</div>
<div id="serviceModal" class="service-modal" onclick="serviceBackdropClose(event)">
  <div class="service-modal-card" onclick="event.stopPropagation()">
    <div class="service-modal-head">
      <div>
        <h2 id="serviceModalTitle">تفاصيل الخدمة</h2>
        <small id="serviceModalSub">عرض مختصر ومنظم للخدمة والصور</small>
      </div>
      <button class="service-modal-close" onclick="closeServiceModal()">إغلاق</button>
    </div>
    <div id="serviceModalBody" class="service-modal-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let currentReport=null, currentServices=[];
let galleryCache={}, activeGallery=[], activeGalleryIndex=0, touchStartX=0;
function imgCount(s){ return [...(s.before_images||[]),...(s.during_images||[]),...(s.after_images||[])].length; }
function firstImg(arr){ return (arr&&arr[0]&&(arr[0].data||arr[0].url))||''; }
function getSrc(im){ if(!im) return ''; if(typeof im==='string') return im; return im.data || im.url || im.src || ''; }
function galleryForService(s){
  const items=[];
  (s.before_images||[]).forEach((im,i)=>items.push({src:getSrc(im),stage:'قبل التنفيذ',no:i+1}));
  (s.during_images||[]).forEach((im,i)=>items.push({src:getSrc(im),stage:'أثناء التنفيذ',no:i+1}));
  (s.after_images||[]).forEach((im,i)=>items.push({src:getSrc(im),stage:'بعد التنفيذ',no:i+1}));
  return items.filter(x=>x.src);
}
function openGallery(serviceId,index){ activeGallery=galleryCache[String(serviceId)]||[]; activeGalleryIndex=index||0; if(!activeGallery.length) return; renderGallery(); $('imgModal').classList.add('open'); }
function renderGallery(){
  const item=activeGallery[activeGalleryIndex]||activeGallery[0]; if(!item) return;
  $('modalImg').src=item.src; $('modalStage').textContent=item.stage; $('modalCounter').textContent=(activeGalleryIndex+1)+' / '+activeGallery.length;
  $('modalDots').innerHTML=activeGallery.map((_,i)=>`<span class="modal-dot ${i===activeGalleryIndex?'active':''}" onclick="goGallery(${i},event)"></span>`).join('');
}
function moveGallery(dir,e){ if(e) e.stopPropagation(); if(!activeGallery.length) return; activeGalleryIndex=(activeGalleryIndex+dir+activeGallery.length)%activeGallery.length; renderGallery(); }
function goGallery(i,e){ if(e) e.stopPropagation(); activeGalleryIndex=i; renderGallery(); }
function closeGallery(e){ if(e) e.stopPropagation(); $('imgModal').classList.remove('open'); }
function modalBackdropClose(e){ if(e.target.id==='imgModal') closeGallery(e); }
function openServiceModal(id){ const s=currentServices.find(x=>String(x.id)===String(id)); if(!s) return; $('serviceModalTitle').textContent=s.title||s.service_type||'تفاصيل الخدمة'; $('serviceModalSub').textContent=''; $('serviceModalBody').innerHTML=renderService(s); $('serviceModal').classList.add('open'); document.body.style.overflow='hidden'; setTimeout(()=>{$('serviceModalBody').querySelectorAll('.reveal').forEach(el=>el.classList.add('show'));},30); }
function closeServiceModal(){ $('serviceModal').classList.remove('open'); document.body.style.overflow=''; }
function serviceBackdropClose(e){ if(e.target.id==='serviceModal') closeServiceModal(); }
function jumpToGates(){ const el=$('serviceGates'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
document.addEventListener('keydown',e=>{ if(!$('imgModal')?.classList.contains('open')) return; if(e.key==='ArrowRight') moveGallery(-1); if(e.key==='ArrowLeft') moveGallery(1); if(e.key==='Escape') closeGallery(); });
document.addEventListener('touchstart',e=>{ if($('imgModal')?.classList.contains('open')) touchStartX=e.changedTouches[0].screenX; },{passive:true});
document.addEventListener('touchend',e=>{ if(!$('imgModal')?.classList.contains('open')) return; const dx=e.changedTouches[0].screenX-touchStartX; if(Math.abs(dx)>50) moveGallery(dx>0?-1:1); },{passive:true});
function iconFor(t){ if(String(t).includes('حشرات')) return '🛡️'; if(String(t).includes('خزانات')) return '💧'; if(String(t).includes('أسطح')) return '🏢'; if(String(t).includes('بيسمنت')) return '🅿️'; if(String(t).includes('كهرباء')) return '💡'; if(String(t).includes('سباكة')) return '🔧'; if(String(t).includes('زراعة')) return '🌿'; return '✅'; }
async function loadClientReport(){
  const token=new URLSearchParams(location.search).get('token');
  if(!token) return showError('رابط التقرير غير صحيح.');
  const {data:report,error}=await sb.from('client_reports').select('*').eq('public_token',token).eq('status','published').maybeSingle();
  if(error || !report) return showError('هذا التقرير غير متاح حاليًا أو لم يتم اعتماده من الإدارة.');
  const {data:services,error:se}=await sb.from('client_report_services').select('*').eq('report_id',report.id).order('sort_order',{ascending:true});
  if(se) return showError('تعذر تحميل خدمات التقرير.');
  currentReport=report; currentServices=services||[]; render();
}
function showError(text){ $('app').className='container loading'; $('app').innerHTML=`<div class="err"><h2>${esc(text)}</h2><p>شركة تصنيف لإدارة المرافق - 920015589</p></div>`; }
function render(){
  const r=currentReport, s=currentServices;
  galleryCache={}; s.forEach(x=>galleryCache[String(x.id)]=galleryForService(x));
  $('app').className='container';
  $('app').innerHTML=`
  <section class="cover">
    <div class="topbar">
      <div class="logo"><div class="logo-mark">ت</div><div><b>شركة تصنيف لإدارة المرافق</b><small>بوابة تقارير العملاء</small></div></div>
      <div class="actions"><button onclick="window.print()">تحميل / طباعة PDF</button><button class="light" onclick="navigator.share?navigator.share({title:document.title,url:location.href}):navigator.clipboard.writeText(location.href)">مشاركة التقرير</button></div>
    </div>
    <h1>${esc(r.title||'تقرير خدمات المشروع')}</h1>
    <p>${esc(r.executive_summary||'تم تنفيذ الأعمال الموضحة في التقرير حسب الخطة التشغيلية المعتمدة.')}</p>
    <div class="meta"><div><small>المشروع</small><b>${esc(r.project_name)}</b></div><div><small>تاريخ التنفيذ</small><b>${esc(r.report_date)}</b></div><div><small>رقم التقرير</small><b>${esc(r.report_no||r.id)}</b></div><div><small>الحالة</small><b>معتمد من الإدارة</b></div></div>
  </section>
  <section class="card reveal"><h2>ملخص التقرير</h2><div class="summary">${esc(r.executive_summary||'').replace(/\n/g,'<br>')}</div></section>
  <section class="card reveal" id="serviceGates"><h2>بوابات الخدمات</h2><div class="service-gates">${s.map((x,i)=>`<div class="gate" onclick="openServiceModal('${x.id}')"><div class="gate-icon">${iconFor(x.service_type)}</div><h3>${esc(x.title||x.service_type)}</h3><p><span class="badge">${imgCount(x)} صورة</span> <span class="badge">مكتمل</span></p><small>فتح التفاصيل داخل نافذة</small></div>`).join('')||'لا توجد خدمات'}</div></section>
  <section class="card reveal"><h2>مسار تنفيذ الخدمة</h2><div class="timeline"><div class="step"><b>1</b>إعداد التقرير</div><div class="step"><b>2</b>توثيق الصور</div><div class="step"><b>3</b>تنفيذ الخدمة</div><div class="step"><b>4</b>مراجعة الجودة</div><div class="step"><b>5</b>اعتماد الإدارة</div></div></section>
  <div class="footer">شركة تصنيف لإدارة المرافق<br>920015589</div>`;
  activateReveal();
}
function renderImages(arr, stageName, serviceId, startIndex){
  arr=arr||[];
  if(!arr.length) return '';
  return `<div class="images">${arr.map((im,idx)=>{const src=getSrc(im); return `<div class="img-card" onclick="openGallery('${serviceId}',${startIndex+idx})"><img src="${src}" alt="${esc(stageName)}"><div class="img-caption"><span>${esc(stageName)}</span><span class="img-no">${idx+1}</span></div></div>`}).join('')}</div>`;
}
function renderStage(title, arr, serviceId, startIndex){
  arr=arr||[];
  if(!arr.length) return '';
  return `<div class="stage reveal"><div class="stage-top"><h3>${title}</h3><span class="stage-count">${arr.length} صورة</span></div>${renderImages(arr,title,serviceId,startIndex)}</div>`;
}
function renderCompare(s){
  const before=firstImg(s.before_images), after=firstImg(s.after_images);
  if(!(before && after)) return '';
  return `<h3 style="color:var(--brand)">مقارنة مختصرة قبل وبعد</h3><div class="compare"><div><b>قبل التنفيذ</b><div class="img-card" onclick="openGallery('${s.id}',0)"><img src="${before}"><div class="img-caption"><span>قبل التنفيذ</span><span class="img-no">1</span></div></div></div><div><b>بعد التنفيذ</b><div class="img-card" onclick="openGallery('${s.id}',${(s.before_images||[]).length+(s.during_images||[]).length})"><img src="${after}"><div class="img-caption"><span>بعد التنفيذ</span><span class="img-no">1</span></div></div></div></div>`;
}
function renderService(s,i){
  const beforeLen=(s.before_images||[]).length, duringLen=(s.during_images||[]).length;
  const stagesHtml = [renderStage('قبل التنفيذ',s.before_images,s.id,0), renderStage('أثناء التنفيذ',s.during_images,s.id,beforeLen), renderStage('بعد التنفيذ',s.after_images,s.id,beforeLen+duringLen)].filter(Boolean).join('');
  return `<section class="service-section">
    <div class="service-head"><div><h2>${esc(s.title||s.service_type)}</h2><p class="badge">${esc(s.service_type||'خدمة')}</p></div><div><p class="badge">عدد الصور: ${imgCount(s)}</p></div></div>
    ${s.service_description?`<p class="summary">${esc(s.service_description).replace(/\n/g,'<br>')}</p>`:''}
    ${s.scope_work?`<div class="scope"><b>نطاق العمل:</b><br>${esc(s.scope_work).replace(/\n/g,'<br>')}</div>`:''}
    ${renderCompare(s)}
    ${stagesHtml?`<div class="stages">${stagesHtml}</div>`:'<div class="scope">لا توجد صور مرفوعة لهذه الخدمة حاليًا.</div>'}
    ${s.notes?`<div class="scope" style="margin-top:12px"><b>ملاحظات الإدارة:</b><br>${esc(s.notes).replace(/\n/g,'<br>')}</div>`:''}
    <div class="rating-box" id="rating-${s.id}"><h3>ما مدى رضاكم عن هذه الخدمة؟</h3><div class="rating-buttons"><button onclick="setRating('${s.id}','ممتاز',this)">ممتاز</button><button onclick="setRating('${s.id}','جيد جدًا',this)">جيد جدًا</button><button onclick="setRating('${s.id}','جيد',this)">جيد</button><button onclick="setRating('${s.id}','يحتاج تحسين',this)">يحتاج تحسين</button></div><textarea id="comment-${s.id}" placeholder="ملاحظاتكم على الخدمة - اختياري"></textarea><label style="display:flex;gap:8px;align-items:center;margin:10px 0"><input id="follow-${s.id}" type="checkbox" style="width:auto"> أرغب بزيارة متابعة</label><button onclick="submitRating('${s.id}')">إرسال التقييم</button><div id="thanks-${s.id}" style="margin-top:8px;color:var(--brand);font-weight:bold"></div></div>
  </section>`;
}
function activateReveal(){
  const els=[...document.querySelectorAll('.reveal')];
  if(!('IntersectionObserver' in window)){ els.forEach(el=>el.classList.add('show')); return; }
  const io=new IntersectionObserver(entries=>{ entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('show'); io.unobserve(en.target); } }); },{threshold:.12});
  els.forEach(el=>io.observe(el));
}
function setRating(serviceId, value, btn){ const box=$(`rating-${serviceId}`); box.dataset.rating=value; box.querySelectorAll('.rating-buttons button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
async function submitRating(serviceId){
  const box=$(`rating-${serviceId}`); const rating=box.dataset.rating; if(!rating){ alert('اختر التقييم أولاً'); return; }
  const s=currentServices.find(x=>String(x.id)===String(serviceId));
  const row={report_id:currentReport.id,service_id:serviceId,project_id:currentReport.project_id,project_name:currentReport.project_name,report_title:currentReport.title,service_title:s?.title||s?.service_type||'',rating,comment:$(`comment-${serviceId}`).value||'',followup_requested:$(`follow-${serviceId}`).checked};
  const {error}=await sb.from('client_service_ratings').insert(row); if(error){ alert(error.message); return; }
  $(`thanks-${serviceId}`).textContent='شكرًا لكم، تم استلام تقييمكم بنجاح.';
  box.querySelector('button[onclick^="submitRating"]').disabled=true;
}
</script>
