<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة العميل - شركة تصنيف لإدارة المرافق</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#0A4033;--brand2:#0f684f;--gold:#b88b35;--bg:#eef5f2;--card:#fff;--line:#dce7e2;--text:#10231d;--muted:#60706a;--red:#b83232;--green:#137a4b;--amber:#9a6b00;--blue:#1e6aa8}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(184,139,53,.16),transparent 34%),linear-gradient(180deg,#e8f3ef,#f8fbfa);color:var(--text)}button{font-family:inherit;border:0;background:var(--brand);color:#fff;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(10,64,51,.12)}button.light{background:#fff;color:var(--brand);border:1px solid var(--line);box-shadow:none}button.gold{background:linear-gradient(135deg,var(--gold),#d9b66b);color:#173b31}button.red{background:var(--red)}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;font-family:inherit;font-size:15px}label{display:block;font-weight:900;color:#183d33;margin:10px 0 6px}.container{width:min(1200px,94vw);margin:auto}.loading{min-height:100vh;display:grid;place-items:center;text-align:center}.loading-card{width:min(480px,92vw);background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:30px;padding:32px;box-shadow:0 24px 70px rgba(10,64,51,.16)}.loading-card img{width:190px;max-width:80%;background:#fff;border-radius:22px;padding:10px}.spinner{width:44px;height:44px;border-radius:50%;border:4px solid #dcebe5;border-top-color:var(--brand);margin:18px auto 0;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.hero{margin:24px 0;background:linear-gradient(135deg,#073e31,var(--brand2));color:#fff;border-radius:34px;padding:28px;box-shadow:0 22px 60px rgba(10,64,51,.22);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:auto -100px -140px auto;width:340px;height:340px;border-radius:50%;background:rgba(255,255,255,.08)}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;position:relative}.brand{display:flex;align-items:center;gap:14px}.brand img{width:92px;height:62px;object-fit:contain;background:#fff;border-radius:18px;padding:7px}.brand b{font-size:19px}.brand small,.hero p{color:#dff1eb}.hero h1{font-size:36px;margin:26px 0 10px;color:#fff}.intro{font-size:17px;line-height:1.9;max-width:850px}.project-pill{display:inline-block;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);padding:9px 14px;border-radius:999px;font-weight:900;color:#fff}.hero-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:22px;position:relative}.hero-action{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.24);border-radius:22px;padding:18px;color:#fff;cursor:pointer;transition:.18s;min-height:128px}.hero-action:hover{transform:translateY(-3px);background:rgba(255,255,255,.18)}.hero-action .ico{font-size:31px}.hero-action h3{margin:10px 0 6px;color:#fff}.hero-action p{margin:0;font-size:13px;line-height:1.7}.filters{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin:14px 0}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:18px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 26px rgba(10,64,51,.06)}.stat small{color:var(--muted);display:block;margin-bottom:8px}.stat b{font-size:25px;color:var(--brand)}.card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:20px;margin:16px 0;box-shadow:0 10px 30px rgba(10,64,51,.06)}.card h2{margin:0 0 14px;color:var(--brand)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.smart-card{background:#fbfdfc;border:1px solid var(--line);border-radius:20px;padding:16px}.smart-card h3{margin:0 0 8px;color:var(--brand)}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8f4ee;color:var(--brand);font-size:12px;font-weight:900}.badge.red{background:#fde8e8;color:#9d2222}.badge.green{background:#e4f5ea;color:#0b7338}.badge.amber{background:#fff3d2;color:#8a5c00}.badge.blue{background:#e9f2fb;color:#1e6aa8}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;background:#fff;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:12px;text-align:right;vertical-align:top;white-space:normal}th{background:#f0f7f4;color:#183d33}.empty{border:1px dashed #bdd4ca;border-radius:18px;padding:25px;text-align:center;color:var(--muted);background:#fbfdfc}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{background:#eef6f3;color:var(--brand);border:1px solid var(--line);box-shadow:none}.tab.active{background:var(--brand);color:#fff}.service-gates{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gate{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fbfdfc;cursor:pointer}.gate:hover{box-shadow:0 12px 28px rgba(10,64,51,.08)}.images{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.img-card{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;cursor:pointer}.img-card img{width:100%;height:230px;object-fit:contain;background:#f7faf9;display:block}.img-cap{padding:8px 10px;color:var(--muted);font-size:12px}.scope{background:#f7fbfa;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.8;margin:12px 0}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stars{display:flex;gap:8px;flex-direction:row-reverse;justify-content:flex-end}.stars button{background:#fff;color:#b88b35;border:1px solid #efdcae;box-shadow:none;font-size:22px;padding:8px 12px}.stars button.active{background:#fff4d6}.footer{text-align:center;color:var(--muted);padding:28px}.modal{position:fixed;inset:0;background:rgba(5,24,19,.72);display:none;align-items:center;justify-content:center;z-index:900;padding:16px;backdrop-filter:blur(8px)}.modal.open{display:flex}.modal-card{width:min(1120px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:30px;box-shadow:0 35px 95px rgba(0,0,0,.32)}.modal-head{position:sticky;top:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:2}.modal-head h2{margin:0;color:#fff}.modal-head small{color:#dff1eb}.modal-body{padding:20px}.toast{position:fixed;bottom:18px;right:18px;background:#0A4033;color:#fff;padding:12px 16px;border-radius:16px;box-shadow:0 16px 35px rgba(0,0,0,.2);z-index:1200;display:none}.toast.show{display:block}.img-modal{z-index:1100;background:rgba(0,0,0,.9)}.img-modal .modal-card{background:transparent;border:0;box-shadow:none;display:grid;place-items:center}.img-modal img{max-width:100%;max-height:78vh;background:#fff;border-radius:18px;object-fit:contain}.img-tools{display:flex;justify-content:space-between;align-items:center;width:100%;color:#fff;margin-bottom:10px}@media(max-width:1000px){.top{display:block}.hero-actions,.stats,.grid,.service-gates,.images,.form-grid,.filters{grid-template-columns:1fr}.hero h1{font-size:27px}.hero-action{min-height:auto}table{font-size:13px}.modal-head{align-items:flex-start}.img-card img{height:auto;max-height:520px}}@media print{.hero-actions,.filters,.tabs,button,.modal{display:none!important}.hero,.card{box-shadow:none}.container{width:100%}}
</style>
</head>
<body onload="loadPortal()">
<div id="app" class="container loading"><div class="loading-card"><img src="tasneef_logo_print.png" alt="شركة تصنيف"><h2>شركة تصنيف لإدارة المرافق</h2><p>نجهّز تقرير مشروعكم الآن...</p><div class="spinner"></div></div></div>
<div id="mainModal" class="modal" onclick="backdropClose(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-head"><div><h2 id="modalTitle">بوابة العميل</h2><small id="modalSub">متابعة المشروع</small></div><button class="light" onclick="closeModal()">إغلاق</button></div><div id="modalBody" class="modal-body"></div></div></div>
<div id="imageModal" class="modal img-modal" onclick="closeImage()"><div class="modal-card"><div class="img-tools"><span id="imageTitle" class="badge">صورة</span><button class="light" onclick="closeImage()">إغلاق</button></div><img id="imagePreview" alt="صورة"></div></div>
<div id="toast" class="toast"></div>
<script>
const SUPABASE_URL = "https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const E=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let portal={projectId:'',projectName:'',from:'',to:'',project:null,reports:[],services:[],tickets:[],timeLogs:[],ratings:[],rating:0};
function toast(t,err){const x=$('toast');x.textContent=t;x.style.background=err?'#b83232':'#0A4033';x.classList.add('show');setTimeout(()=>x.classList.remove('show'),3200)}
function today(){return new Date().toISOString().slice(0,10)}
function monthStart(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}
function dateOnly(v){return String(v||'').slice(0,10)}
function inRange(v,from,to){const d=dateOnly(v);return(!from||d>=from)&&(!to||d<=to)}
function fmt(v){try{return v?new Date(v).toLocaleString('ar-SA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'numeric',minute:'2-digit'}):'-'}catch(e){return String(v||'-')}}
function minutesBetween(a,b){if(!a||!b)return 0;const x=new Date(a),y=new Date(b);const m=Math.round((y-x)/60000);return isFinite(m)&&m>0?m:0}
function minToHr(m){m=Number(m)||0;const h=Math.floor(m/60),r=m%60;return h?`${h} س ${r} د`:`${r} د`}
function decodeToken(){const u=new URL(location.href);let t=u.searchParams.get('token');if(!t){return {project_id:u.searchParams.get('project')||u.searchParams.get('project_id'),from:u.searchParams.get('from')||monthStart(),to:u.searchParams.get('to')||today()};}try{t=t.replace(/-/g,'+').replace(/_/g,'/');while(t.length%4)t+='=';return JSON.parse(decodeURIComponent(escape(atob(t))))}catch(e){return {project_id:null,from:monthStart(),to:today()}}}
function reportTitle(r){return r?.title||r?.report_title||r?.report_no||'تقرير مشروع'}
function serviceName(s){return s?.title||s?.service_title||s?.service_type||'خدمة منفذة'}
function ticketNo(t){return t?.ticket_number||t?.ticket_no||(t?.id?('T-'+String(t.id).padStart(4,'0')):'-')}
function statusLabel(s){return ({open:'مفتوحة',processing:'قيد التنفيذ',in_progress:'قيد التنفيذ',closed:'مغلقة',pending:'معلقة',reopened:'معاد فتحها'}[String(s||'open')]||s||'مفتوحة')}
function statusClass(s){return String(s||'open')==='closed'?'green':(String(s||'')==='processing'||String(s||'')==='in_progress'?'amber':'red')}
function asImages(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);try{const x=JSON.parse(v);return Array.isArray(x)?x.filter(Boolean):[]}catch(e){return[]}}
function getSrc(x){return typeof x==='string'?x:(x?.url||x?.data||x?.src||'')}
function before(s){return asImages(s.before_images||s.images_before)}function during(s){return asImages(s.during_images||s.images_during)}function after(s){return asImages(s.after_images||s.images_after||s.after)}
function imgCount(s){return before(s).length+during(s).length+after(s).length}
function serviceIcon(t){t=String(t||'');if(t.includes('حشر'))return'🛡️';if(t.includes('خزان'))return'💧';if(t.includes('كهرب'))return'💡';if(t.includes('سباك'))return'🔧';if(t.includes('نظاف'))return'🧹';if(t.includes('مصعد'))return'🛗';return'✅'}
async function loadPortal(){try{const payload=decodeToken();portal.projectId=payload.project_id||payload.projectId;portal.from=payload.from||monthStart();portal.to=payload.to||today();if(!portal.projectId)throw new Error('رابط العميل غير مكتمل. لا يوجد مشروع مرتبط بالرابط.');await loadData();renderHome()}catch(e){$('app').className='container loading';$('app').innerHTML=`<div class="loading-card"><img src="tasneef_logo_print.png"><h2>تعذر فتح بوابة العميل</h2><p>${E(e.message||String(e))}</p></div>`}}
async function loadData(){
  const pr=await sb.from('projects').select('*').eq('id',portal.projectId).maybeSingle();portal.project=pr.data||{};portal.projectName=portal.project.name||'مشروع العميل';
  let logsQ=sb.from('time_logs').select('*').eq('project_id',portal.projectId).order('check_in',{ascending:false}).limit(5000);if(portal.from)logsQ=logsQ.gte('log_date',portal.from);if(portal.to)logsQ=logsQ.lte('log_date',portal.to);
  let ticQ=sb.from('tickets').select('*').eq('project_id',portal.projectId).order('created_at',{ascending:false}).limit(1000);if(portal.from)ticQ=ticQ.gte('created_at',portal.from+'T00:00:00');if(portal.to)ticQ=ticQ.lte('created_at',portal.to+'T23:59:59');
  let repQ=sb.from('client_reports').select('*').eq('project_id',portal.projectId).order('report_date',{ascending:false}).limit(500);if(portal.from)repQ=repQ.gte('report_date',portal.from);if(portal.to)repQ=repQ.lte('report_date',portal.to);
  const [logs,tickets,reports]=await Promise.all([logsQ,ticQ,repQ]);portal.timeLogs=logs.data||[];portal.tickets=tickets.data||[];portal.reports=reports.data||[];
  const ids=portal.reports.map(r=>r.id).filter(Boolean);portal.services=[];if(ids.length){try{const sr=await sb.from('client_report_services').select('*').in('report_id',ids).order('id',{ascending:true});portal.services=sr.data||[]}catch(e){}}
  try{let rt=sb.from('client_service_ratings').select('*').eq('project_id',portal.projectId).order('created_at',{ascending:false}).limit(100);if(portal.from)rt=rt.gte('created_at',portal.from+'T00:00:00');if(portal.to)rt=rt.lte('created_at',portal.to+'T23:59:59');const rr=await rt;portal.ratings=rr.data||[]}catch(e){portal.ratings=[]}
}
function stats(){const minutes=portal.timeLogs.reduce((a,l)=>a+(Number(l.duration_minutes)||minutesBetween(l.check_in,l.check_out)),0);const days=new Set(portal.timeLogs.map(l=>dateOnly(l.log_date||l.check_in)).filter(Boolean)).size;const open=portal.tickets.filter(t=>String(t.status||'open')!=='closed').length;const nums=portal.ratings.map(r=>Number(r.rating_value||r.score||({'ممتاز':5,'جيد جدًا':4,'جيد':3,'يحتاج تحسين':2}[r.rating]||0))).filter(Boolean);const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):'-';return{minutes,days,open,closed:portal.tickets.length-open,avg}}
function renderHome(){const st=stats();$('app').className='container';document.title=`بوابة ${portal.projectName} - شركة تصنيف`; $('app').innerHTML=`
<section class="hero"><div class="top"><div class="brand"><img src="tasneef_logo_print.png" alt="تصنيف"><div><b>شركة تصنيف لإدارة المرافق</b><br><small>بوابة العميل لمتابعة أداء المشروع</small></div></div><div><span class="project-pill">${E(portal.projectName)}</span></div></div><h1>مرحبًا بكم في بوابة مشروعكم</h1><p class="intro">من هذه الصفحة يمكنكم الاطلاع على تقرير المشروع خلال الفترة المحددة، التسجيلات اليومية، الأعمال المنفذة، تذاكر المشروع، وإرسال تقييمكم بشكل مباشر.</p><div class="hero-actions"><div class="hero-action" onclick="showMain('summary')"><div class="ico">📊</div><h3>تقرير مشروعك</h3><p>ملخص ساعات العمل، الأعمال المنفذة، التذاكر والتقييم.</p></div><div class="hero-action" onclick="showMain('tickets')"><div class="ico">🎫</div><h3>التذاكر</h3><p>متابعة حالة التذاكر الخاصة بالمشروع.</p></div><div class="hero-action" onclick="openRating()"><div class="ico">⭐</div><h3>تقييم الخدمة</h3><p>تقييم احترافي وملاحظات تصل للإدارة.</p></div></div></section>
<section class="card"><h2>فلترة التقرير</h2><div class="filters"><div><label>من تاريخ</label><input type="date" id="fromDate" value="${E(portal.from)}"></div><div><label>إلى تاريخ</label><input type="date" id="toDate" value="${E(portal.to)}"></div><button onclick="applyFilter(this)">تطبيق الفلتر</button></div></section>
<section class="stats"><div class="stat"><small>ساعات العمل</small><b>${E(minToHr(st.minutes))}</b></div><div class="stat"><small>أيام الحضور</small><b>${st.days}</b></div><div class="stat"><small>التقارير</small><b>${portal.reports.length}</b></div><div class="stat"><small>الأعمال المنفذة</small><b>${portal.services.length}</b></div><div class="stat"><small>التذاكر المفتوحة</small><b>${st.open}</b></div><div class="stat"><small>متوسط التقييم</small><b>${st.avg}</b></div></section>
<div id="mainContent"></div><div class="footer">شركة تصنيف لإدارة المرافق<br>تم إنشاء هذا التقرير من نظام شركة تصنيف لإدارة المرافق ويعتبر معتمدًا ما لم يرد خلاف ذلك.</div>`;showMain('summary')}
async function applyFilter(btn){portal.from=$('fromDate').value||monthStart();portal.to=$('toDate').value||today();if(btn){btn.disabled=true;btn.textContent='جاري التحديث...'}await loadData();renderHome();toast('تم تحديث الفترة')}
function showMain(tab){const box=$('mainContent');if(!box)return;const tabs=`<div class="tabs"><button class="tab ${tab==='summary'?'active':''}" onclick="showMain('summary')">الملخص</button><button class="tab ${tab==='logs'?'active':''}" onclick="showMain('logs')">التسجيلات اليومية</button><button class="tab ${tab==='works'?'active':''}" onclick="showMain('works')">الأعمال المنفذة</button><button class="tab ${tab==='tickets'?'active':''}" onclick="showMain('tickets')">التذاكر</button><button class="tab ${tab==='rating'?'active':''}" onclick="showMain('rating')">التقييم</button></div>`;box.innerHTML=tabs+(tab==='logs'?logsHtml():tab==='works'?worksHtml():tab==='tickets'?ticketsHtml():tab==='rating'?ratingHtml():summaryHtml())}
function summaryHtml(){return `<section class="grid"><div class="smart-card"><h3>ساعات العمل</h3><p>إجمالي الفترة: <b>${minToHr(stats().minutes)}</b></p><button onclick="showMain('logs')">عرض التسجيلات</button></div><div class="smart-card"><h3>الأعمال المنفذة</h3><p>عدد الأعمال الموثقة: <b>${portal.services.length}</b></p><button onclick="showMain('works')">عرض الأعمال</button></div><div class="smart-card"><h3>التذاكر</h3><p>مفتوحة: <b>${stats().open}</b> / مغلقة: <b>${stats().closed}</b></p><button onclick="showMain('tickets')">عرض التذاكر</button></div></section><section class="card"><h2>ملخص تنفيذي</h2><p style="line-height:1.9;color:#31443d">يعرض هذا التقرير بيانات مشروع ${E(portal.projectName)} للفترة من ${E(portal.from)} إلى ${E(portal.to)}، متضمنًا ساعات العمل المسجلة، الأعمال المنفذة من المشرفين، والتذاكر التشغيلية الخاصة بالمشروع.</p></section>`}
function logsHtml(){const rows=portal.timeLogs.map(l=>`<tr><td>${E(dateOnly(l.log_date||l.check_in))}</td><td>${E(fmt(l.check_in))}</td><td>${E(l.check_out?fmt(l.check_out):'-')}</td><td>${E(minToHr(Number(l.duration_minutes)||minutesBetween(l.check_in,l.check_out)))}</td><td>${E(l.time_status||'-')}</td><td>${E(l.notes||'-')}</td></tr>`).join('');return `<section class="card"><h2>التسجيلات اليومية</h2>${rows?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>الدخول</th><th>الخروج</th><th>المدة</th><th>حالة الوقت</th><th>ملاحظات</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تسجيلات يومية ضمن الفترة المحددة.</div>'}</section>`}
function worksHtml(){const cards=portal.reports.map(r=>{const ss=portal.services.filter(s=>String(s.report_id)===String(r.id));return `<div class="smart-card"><h3>${E(reportTitle(r))}</h3><p><span class="badge blue">${E(dateOnly(r.report_date||r.created_at))}</span> <span class="badge green">${ss.length} أعمال</span></p><p style="color:#60706a;line-height:1.7">${E(r.executive_summary||'تم توثيق الأعمال المنفذة ضمن هذا التقرير.')}</p><button onclick="openReportDetails('${E(r.id)}')">عرض التفاصيل والصور</button></div>`}).join('');return `<section class="card"><h2>الأعمال والتقارير المنفذة</h2>${cards?`<div class="service-gates">${cards}</div>`:'<div class="empty">لا توجد تقارير أعمال ضمن الفترة المحددة.</div>'}</section>`}
function ticketsHtml(){const rows=portal.tickets.map(x=>`<tr><td><b>${E(ticketNo(x))}</b></td><td>${E(x.title||'-')}<br><small>${E(x.description||'')}</small></td><td><span class="badge ${statusClass(x.status)}">${E(statusLabel(x.status))}</span></td><td>${E(x.priority||'عادي')}</td><td>${E(fmt(x.created_at))}</td><td>${E(x.closure_note||x.close_note||x.notes||'-')}</td></tr>`).join('');return `<section class="card"><h2>التذاكر الخاصة بالمشروع</h2>${rows?`<div class="table-wrap"><table><thead><tr><th>رقم التذكرة</th><th>الموضوع</th><th>الحالة</th><th>الأولوية</th><th>تاريخ الفتح</th><th>آخر إجراء</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تذاكر ضمن الفترة المحددة.</div>'}</section>`}
function ratingHtml(){return `<section class="card"><h2>تقييم الخدمة</h2><p style="color:#60706a;line-height:1.8">تقييمكم يساعدنا في تحسين مستوى التشغيل والخدمة.</p>${ratingFormHtml()}</section><section class="card"><h2>التقييمات السابقة</h2>${ratingsTable()}</section>`}
function ratingsTable(){const rows=portal.ratings.map(r=>`<tr><td>${E(fmt(r.created_at))}</td><td>${E(r.rating||'-')}</td><td>${E(r.comment||'-')}</td><td>${r.followup_requested?'نعم':'لا'}</td></tr>`).join('');return rows?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>التقييم</th><th>الملاحظة</th><th>طلب متابعة</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تقييمات سابقة ضمن الفترة.</div>'}
function ratingFormHtml(){return `<label>التقييم العام</label><div class="stars">${[5,4,3,2,1].map(n=>`<button type="button" id="star${n}" onclick="setRating(${n})">★</button>`).join('')}</div><label>ملاحظات العميل</label><textarea id="ratingComment" rows="5" placeholder="اكتب ملاحظتك هنا"></textarea><label style="display:flex;align-items:center;gap:8px"><input id="ratingFollow" type="checkbox" style="width:auto"> أطلب زيارة متابعة</label><button onclick="submitRating(this)">إرسال التقييم</button>`}
function setRating(n){portal.rating=n;[1,2,3,4,5].forEach(i=>{const b=$('star'+i);if(b)b.classList.toggle('active',i<=n)})}
function openRating(){openModal('تقييم الخدمة',portal.projectName,ratingFormHtml())}
async function submitRating(btn){try{if(!portal.rating)throw new Error('اختر التقييم أولًا');if(btn){btn.disabled=true;btn.textContent='جاري الإرسال...'}const label=portal.rating>=5?'ممتاز':portal.rating===4?'جيد جدًا':portal.rating===3?'جيد':'يحتاج تحسين';const row={project_id:Number(portal.projectId),project_name:portal.projectName,rating:label,rating_value:portal.rating,comment:$('ratingComment')?.value||'',followup_requested:!!$('ratingFollow')?.checked,report_title:'تقييم بوابة العميل',service_title:'تقييم عام'};const res=await sb.from('client_service_ratings').insert(row).select('*').single();if(res.error)throw res.error;portal.ratings=[res.data,...portal.ratings];toast('تم إرسال التقييم بنجاح');closeModal();showMain('rating')}catch(e){toast(e.message||String(e),true)}finally{if(btn){btn.disabled=false;btn.textContent='إرسال التقييم'}}}
function openReportDetails(id){const r=portal.reports.find(x=>String(x.id)===String(id));if(!r)return;const ss=portal.services.filter(s=>String(s.report_id)===String(id));openModal(reportTitle(r),`تاريخ التقرير: ${dateOnly(r.report_date||r.created_at)}`,`<div class="scope"><b>ملخص التقرير:</b><br>${E(r.executive_summary||'تم تنفيذ الأعمال الموضحة في التقرير.').replace(/\n/g,'<br>')}</div><div class="service-gates">${ss.map(s=>`<div class="gate" onclick="openServiceDetails('${E(s.id)}')"><div style="font-size:30px">${serviceIcon(s.service_type||s.title)}</div><h3>${E(serviceName(s))}</h3><p><span class="badge green">${imgCount(s)} صورة</span></p></div>`).join('')||'<div class="empty">لا توجد أعمال داخل هذا التقرير.</div>'}</div>`)}
function openServiceDetails(id){const s=portal.services.find(x=>String(x.id)===String(id));if(!s)return;const stage=(title,imgs)=>imgs.length?`<h3 style="color:var(--brand)">${title}</h3><div class="images">${imgs.map((im,i)=>{const src=getSrc(im);return `<div class="img-card" onclick="openImage('${encodeURIComponent(src)}','${E(title)}')"><img src="${E(src)}"><div class="img-cap">${E(title)} - ${i+1}</div></div>`}).join('')}</div>`:'';openModal(serviceName(s),s.service_type||'خدمة',`<div class="scope">${s.service_description?E(s.service_description).replace(/\n/g,'<br>'):'تفاصيل الخدمة الموثقة من المشرف.'}</div>${s.scope_work?`<div class="scope"><b>نطاق العمل:</b><br>${E(s.scope_work).replace(/\n/g,'<br>')}</div>`:''}${stage('قبل التنفيذ',before(s))}${stage('أثناء التنفيذ',during(s))}${stage('بعد التنفيذ',after(s))}${s.notes?`<div class="scope"><b>ملاحظات:</b><br>${E(s.notes).replace(/\n/g,'<br>')}</div>`:''}`)}
function openModal(title,sub,body){$('modalTitle').textContent=title;$('modalSub').textContent=sub||'';$('modalBody').innerHTML=body;$('mainModal').classList.add('open');document.body.style.overflow='hidden'}function closeModal(){$('mainModal').classList.remove('open');document.body.style.overflow=''}function backdropClose(e){if(e.target.id==='mainModal')closeModal()}function openImage(src,title){$('imagePreview').src=decodeURIComponent(src);$('imageTitle').textContent=title||'صورة';$('imageModal').classList.add('open')}function closeImage(){$('imageModal').classList.remove('open')}
</script>
</body>
</html>
