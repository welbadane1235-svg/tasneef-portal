<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير العميل - تصنيف</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#0A4033;--brand2:#0f5a47;--bg:#f3f6f5;--card:#fff;--line:#dce6e2;--text:#10231d;--muted:#60706a;--red:#b83232;--green:#137a4b;--amber:#9a6b00}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#eaf4f0,#f7fbfa);color:var(--text)}button{font-family:inherit;border:0;background:var(--brand);color:#fff;border-radius:12px;padding:11px 15px;font-weight:700;cursor:pointer}button.light{background:#eef6f3;color:var(--brand);border:1px solid var(--line)}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff;font-family:inherit}.container{width:min(1180px,94vw);margin:auto}.cover{margin:22px auto;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(10,64,51,.18);position:relative;overflow:hidden}.cover:before{content:"";position:absolute;inset:auto -80px -120px auto;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.08)}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;position:relative}.logo{display:flex;gap:12px;align-items:center}.logo-mark{width:58px;height:58px;border-radius:18px;background:#fff;color:var(--brand);display:grid;place-items:center;font-size:28px;font-weight:900}.logo small,.cover p{color:#e6f5ef}.cover h1{font-size:32px;margin:22px 0 8px}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px;position:relative}.meta div{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:12px;border-radius:16px}.meta small{display:block;color:#cfe9df;margin-bottom:5px}.actions{display:flex;gap:8px;flex-wrap:wrap}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin:16px 0;box-shadow:0 10px 28px rgba(10,64,51,.06)}.card h2{margin:0 0 14px;color:var(--brand)}.summary{font-size:17px;line-height:1.9}.service-gates{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gate{background:#fbfdfc;border:1px solid var(--line);border-radius:20px;padding:16px;cursor:pointer;transition:.2s}.gate:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(10,64,51,.08)}.gate-icon{width:46px;height:46px;border-radius:16px;background:#e8f4ee;color:var(--brand);display:grid;place-items:center;font-size:22px;margin-bottom:10px}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8f4ee;color:var(--brand);font-size:12px;font-weight:700}.service-section{scroll-margin-top:16px}.service-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.scope{background:#f7fbfa;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.8;color:#31443d}.stages{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.stage h3{color:var(--brand);margin:0 0 10px}.images{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.img-card{border:1px solid var(--line);border-radius:16px;background:#f8fbfa;overflow:hidden;cursor:pointer}.img-card img{width:100%;height:220px;object-fit:contain;background:#fff;display:block}.empty-img{border:1px dashed #c7d8d2;border-radius:16px;padding:24px;text-align:center;color:var(--muted);background:#fbfdfc}.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}.compare .img-card img{height:260px}.timeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.step{background:#fbfdfc;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.step b{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;margin:0 auto 8px}.rating-box{background:#f7fbfa;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:16px}.rating-buttons{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.rating-buttons button{background:#fff;color:var(--brand);border:1px solid var(--line)}.rating-buttons button.active{background:var(--brand);color:#fff}.footer{text-align:center;color:var(--muted);padding:26px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:999}.modal.open{display:flex}.modal img{max-width:96vw;max-height:88vh;object-fit:contain;background:#fff;border-radius:12px}.close{position:absolute;top:18px;left:18px;background:#fff;color:#111}.loading{min-height:80vh;display:grid;place-items:center;text-align:center}.err{background:#fde8e8;color:#9d2222;border:1px solid #efc3c3;border-radius:18px;padding:18px}.print-only{display:none}@media(max-width:900px){.topbar,.service-head{display:block}.meta,.service-gates,.stages,.timeline,.compare{grid-template-columns:1fr}.images{grid-template-columns:1fr}.cover h1{font-size:25px}.actions{margin-top:14px}.img-card img,.compare .img-card img{height:auto;max-height:520px}}@media print{body{background:#fff}.actions,.rating-box{display:none}.cover,.card{box-shadow:none}.container{width:100%;}.print-only{display:block}.img-card img{height:auto;max-height:400px}.stage,.service-section{break-inside:avoid}}
</style>
</head>
<body onload="loadClientReport()">
<div id="app" class="container loading"><div><h2>جاري تحميل التقرير...</h2><p>شركة تصنيف لإدارة المرافق</p></div></div>
<div id="imgModal" class="modal" onclick="this.classList.remove('open')"><button class="close">إغلاق</button><img id="modalImg"></div>
<script>
const SUPABASE_URL = "https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let currentReport=null, currentServices=[];
function imgCount(s){ return [...(s.before_images||[]),...(s.during_images||[]),...(s.after_images||[])].length; }
function firstImg(arr){ return (arr&&arr[0]&&(arr[0].data||arr[0].url))||''; }
function openImg(src){ $('modalImg').src=src; $('imgModal').classList.add('open'); }
function iconFor(t){ if(String(t).includes('حشرات')) return '🛡️'; if(String(t).includes('خزانات')) return '💧'; if(String(t).includes('أسطح')) return '🏢'; if(String(t).includes('بيسمنت')) return '🅿️'; if(String(t).includes('كهرباء')) return '💡'; if(String(t).includes('سباكة')) return '🔧'; if(String(t).includes('زراعة')) return '🌿'; return '✅'; }
async function loadClientReport(){
  const token=new URLSearchParams(location.search).get('token');
  if(!token) return showError('رابط التقرير غير صحيح.');
  const {data:report,error}=await sb.from('client_reports').select('*').eq('public_token',token).eq('status','published').maybeSingle();
  if(error || !report) return showError('هذا التقرير غير متاح حاليًا أو لم يتم اعتماده من الإدارة.');
  const {data:services,error:se}=await sb.from('client_report_services').select('*').eq('report_id',report.id).order('sort_order',{ascending:true});
  if(se) return showError('تعذر تحميل خدمات التقرير.');
  currentReport=report; currentServices=services||[]; render();
}
function showError(text){ $('app').className='container loading'; $('app').innerHTML=`<div class="err"><h2>${esc(text)}</h2><p>شركة تصنيف لإدارة المرافق - 920015589</p></div>`; }
function render(){
  const r=currentReport, s=currentServices;
  $('app').className='container';
  $('app').innerHTML=`
  <section class="cover">
    <div class="topbar">
      <div class="logo"><div class="logo-mark">ت</div><div><b>شركة تصنيف لإدارة المرافق</b><small>بوابة تقارير العملاء</small></div></div>
      <div class="actions"><button onclick="window.print()">تحميل / طباعة PDF</button><button class="light" onclick="navigator.share?navigator.share({title:document.title,url:location.href}):navigator.clipboard.writeText(location.href)">مشاركة التقرير</button></div>
    </div>
    <h1>${esc(r.title||'تقرير خدمات المشروع')}</h1>
    <p>${esc(r.executive_summary||'تم تنفيذ الأعمال الموضحة في التقرير حسب الخطة التشغيلية المعتمدة.')}</p>
    <div class="meta"><div><small>المشروع</small><b>${esc(r.project_name)}</b></div><div><small>تاريخ التنفيذ</small><b>${esc(r.report_date)}</b></div><div><small>رقم التقرير</small><b>${esc(r.report_no||r.id)}</b></div><div><small>الحالة</small><b>معتمد من الإدارة</b></div></div>
  </section>
  <section class="card"><h2>ملخص التقرير</h2><div class="summary">${esc(r.executive_summary||'').replace(/\n/g,'<br>')}</div></section>
  <section class="card"><h2>بوابات الخدمات</h2><div class="service-gates">${s.map((x,i)=>`<div class="gate" onclick="document.getElementById('service-${x.id}').scrollIntoView({behavior:'smooth'})"><div class="gate-icon">${iconFor(x.service_type)}</div><h3>${esc(x.title||x.service_type)}</h3><p><span class="badge">${imgCount(x)} صورة</span> <span class="badge">مكتمل</span></p><small>عرض التفاصيل</small></div>`).join('')||'لا توجد خدمات'}</div></section>
  <section class="card"><h2>مسار تنفيذ الخدمة</h2><div class="timeline"><div class="step"><b>1</b>إعداد التقرير</div><div class="step"><b>2</b>توثيق الصور</div><div class="step"><b>3</b>تنفيذ الخدمة</div><div class="step"><b>4</b>مراجعة الجودة</div><div class="step"><b>5</b>اعتماد الإدارة</div></div></section>
  ${s.map(renderService).join('')}
  <div class="footer">شركة تصنيف لإدارة المرافق<br>920015589</div>`;
}
function renderImages(arr){ arr=arr||[]; if(!arr.length) return '<div class="empty-img">لا توجد صور في هذا القسم</div>'; return `<div class="images">${arr.map(im=>{const src=im.data||im.url||''; return `<div class="img-card" onclick="openImg('${src}')"><img src="${src}" alt="صورة التقرير"></div>`}).join('')}</div>`; }
function renderService(s,i){
  const before=firstImg(s.before_images), after=firstImg(s.after_images);
  return `<section class="card service-section" id="service-${s.id}">
    <div class="service-head"><div><h2>${esc(s.title||s.service_type)}</h2><p class="badge">${esc(s.service_type||'خدمة')}</p></div><p class="badge">عدد الصور: ${imgCount(s)}</p></div>
    ${s.service_description?`<p class="summary">${esc(s.service_description).replace(/\n/g,'<br>')}</p>`:''}
    ${s.scope_work?`<div class="scope"><b>نطاق العمل:</b><br>${esc(s.scope_work).replace(/\n/g,'<br>')}</div>`:''}
    ${(before||after)?`<h3 style="color:var(--brand)">مقارنة قبل وبعد</h3><div class="compare"><div><b>قبل التنفيذ</b>${before?`<div class="img-card" onclick="openImg('${before}')"><img src="${before}"></div>`:'<div class="empty-img">لا توجد صورة قبل</div>'}</div><div><b>بعد التنفيذ</b>${after?`<div class="img-card" onclick="openImg('${after}')"><img src="${after}"></div>`:'<div class="empty-img">لا توجد صورة بعد</div>'}</div></div>`:''}
    <div class="stages"><div class="stage"><h3>قبل التنفيذ</h3>${renderImages(s.before_images)}</div><div class="stage"><h3>أثناء التنفيذ</h3>${renderImages(s.during_images)}</div><div class="stage"><h3>بعد التنفيذ</h3>${renderImages(s.after_images)}</div></div>
    ${s.notes?`<div class="scope" style="margin-top:12px"><b>ملاحظات الإدارة:</b><br>${esc(s.notes).replace(/\n/g,'<br>')}</div>`:''}
    <div class="rating-box" id="rating-${s.id}"><h3>ما مدى رضاكم عن هذه الخدمة؟</h3><div class="rating-buttons"><button onclick="setRating('${s.id}','ممتاز',this)">ممتاز</button><button onclick="setRating('${s.id}','جيد جدًا',this)">جيد جدًا</button><button onclick="setRating('${s.id}','جيد',this)">جيد</button><button onclick="setRating('${s.id}','يحتاج تحسين',this)">يحتاج تحسين</button></div><textarea id="comment-${s.id}" placeholder="ملاحظاتكم على الخدمة - اختياري"></textarea><label style="display:flex;gap:8px;align-items:center;margin:10px 0"><input id="follow-${s.id}" type="checkbox" style="width:auto"> أرغب بزيارة متابعة</label><button onclick="submitRating('${s.id}')">إرسال التقييم</button><div id="thanks-${s.id}" style="margin-top:8px;color:var(--brand);font-weight:bold"></div></div>
  </section>`;
}
function setRating(serviceId, value, btn){ const box=$(`rating-${serviceId}`); box.dataset.rating=value; box.querySelectorAll('.rating-buttons button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
async function submitRating(serviceId){
  const box=$(`rating-${serviceId}`); const rating=box.dataset.rating; if(!rating){ alert('اختر التقييم أولاً'); return; }
  const s=currentServices.find(x=>String(x.id)===String(serviceId));
  const row={report_id:currentReport.id,service_id:serviceId,project_id:currentReport.project_id,project_name:currentReport.project_name,report_title:currentReport.title,service_title:s?.title||s?.service_type||'',rating,comment:$(`comment-${serviceId}`).value||'',followup_requested:$(`follow-${serviceId}`).checked};
  const {error}=await sb.from('client_service_ratings').insert(row); if(error){ alert(error.message); return; }
  $(`thanks-${serviceId}`).textContent='شكرًا لكم، تم استلام تقييمكم بنجاح.';
  box.querySelector('button[onclick^="submitRating"]').disabled=true;
}
</script>
</body>
</html>
