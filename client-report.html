<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<title>بوابة العميل - شركة تصنيف لإدارة المرافق</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#0A4033;--brand2:#0f684f;--bg:#eef5f2;--card:#fff;--line:#dce7e2;--muted:#60706a;--red:#b83232;--green:#137a4b;--amber:#a66b00;--blue:#1e6aa8}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#e8f3ef,#f8fbfa);color:#10231d}button{font-family:inherit;border:0;background:var(--brand);color:#fff;border-radius:13px;padding:11px 16px;font-weight:900;cursor:pointer}button.light{background:#fff;color:var(--brand);border:1px solid var(--line)}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px;background:#fff;font-family:inherit}label{display:block;font-weight:900;margin:8px 0 5px;color:#123f34}.container{width:min(1180px,94vw);margin:auto}.hero{margin:22px 0;background:linear-gradient(135deg,#073e31,var(--brand2));color:#fff;border-radius:30px;padding:26px;box-shadow:0 18px 50px rgba(10,64,51,.20)}.hero-top{display:flex;justify-content:space-between;gap:16px;align-items:center}.hero h1{margin:18px 0 8px;font-size:32px;color:#fff}.hero p{color:#e6f4ef;line-height:1.8}.logo{display:flex;align-items:center;gap:12px}.logo img{width:86px;height:62px;object-fit:contain;background:#fff;border-radius:16px;padding:7px}.pill{display:inline-block;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);padding:8px 13px;border-radius:999px;font-weight:900}.filters,.stats{display:grid;gap:10px}.filters{grid-template-columns:1fr 1fr auto;align-items:end;margin:14px 0}.stats{grid-template-columns:repeat(5,1fr);margin:16px 0}.stat,.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 26px rgba(10,64,51,.06)}.stat{padding:16px}.stat small{display:block;color:var(--muted);margin-bottom:7px}.stat b{font-size:24px;color:var(--brand)}.card{padding:20px;margin:16px 0}.card h2{margin:0 0 14px;color:var(--brand)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{background:#e8f4ee;color:var(--brand);box-shadow:none}.tab.active{background:var(--brand);color:#fff}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;min-width:900px;background:#fff}th{background:#eef7f3;color:#123f34}th,td{border-bottom:1px solid var(--line);padding:12px;text-align:right;vertical-align:top}.badge{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.green{background:#e4f4ea;color:var(--green)}.red{background:#fde8e8;color:var(--red)}.amber{background:#fff1c8;color:var(--amber)}.blue{background:#e7f1fb;color:var(--blue)}.empty{border:1px dashed #b9d4cb;border-radius:16px;padding:24px;text-align:center;color:var(--muted)}.loading{min-height:100vh;display:grid;place-items:center}.loading-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;text-align:center;width:min(460px,92vw);box-shadow:0 18px 50px rgba(10,64,51,.14)}.loading-card img{width:170px;max-width:80%}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:99;padding:20px}.modal.show{display:flex}.modal-card{background:#fff;border-radius:24px;border:1px solid var(--line);width:min(650px,96vw);max-height:90vh;overflow:auto;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}.toast{position:fixed;bottom:18px;right:18px;background:var(--brand);color:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 10px 24px rgba(0,0,0,.18);display:none;z-index:150}.toast.show{display:block}.foot{text-align:center;color:#60706a;margin:30px 0 18px;font-size:13px}.workers span{display:inline-block;margin:2px 3px;padding:4px 8px;border:1px solid #cde5dc;border-radius:999px;background:#f2faf7;font-weight:700}.workers .absent{background:#fde8e8;color:#b83232;border-color:#f1c3c3}@media(max-width:850px){.filters,.stats{grid-template-columns:1fr}.hero-top{display:block}.hero h1{font-size:25px}}@media print{button,.filters,.tabs,.modal,.toast{display:none!important}.hero,.card,.stat{box-shadow:none}.container{width:100%}}
</style>
</head>
<body onload="loadPortal()">
<div id="app" class="container loading"><div class="loading-card"><img src="tasneef_logo_print.png" alt="تصنيف"><h2>جاري تحميل بوابة العميل</h2><p>يرجى الانتظار...</p></div></div>
<div id="ticketModal" class="modal"><div class="modal-card"><div class="modal-head"><h2>رفع تذكرة</h2><button class="light" onclick="closeTicketModal()">إغلاق</button></div><div><label>نوع التذكرة</label><select id="ticketType"><option>كهرباء</option><option>سباكة</option><option>صيانة</option><option>نظافة</option><option>مصاعد</option><option>أخرى</option></select><label>العنوان</label><input id="ticketTitle" placeholder="مثال: ضعف المياه"><label>الموقع / رقم الوحدة</label><input id="ticketLocation" placeholder="اختياري"><label>الوصف</label><textarea id="ticketDesc" rows="4" placeholder="اكتب تفاصيل مختصرة"></textarea><div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end"><button onclick="submitClientTicket()">إرسال التذكرة</button><button class="light" onclick="closeTicketModal()">إلغاء</button></div></div></div></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
const SUPABASE_URL="https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=v=>Number(String(v??'').replace(/,/g,''))||0;
const norm=v=>String(v??'').trim().toLowerCase().replace(/[إأآا]/g,'ا').replace(/[ىي]/g,'ي').replace(/ة/g,'ه').replace(/[ًٌٍَُِّْـ]/g,'').replace(/[^\p{L}\p{N}]+/gu,' ');
const today=()=>new Date().toISOString().slice(0,10);
const monthStart=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`};
const fmtDT=v=>{if(!v)return '-';try{return new Date(v).toLocaleString('en-US',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true})}catch(_){return String(v)}};
const fmtD=v=>{if(!v)return '-';try{return new Date(v).toLocaleDateString('en-US',{year:'numeric',month:'2-digit',day:'2-digit'})}catch(_){return String(v)}};
const dateOnly=v=>String(v||'').slice(0,10);
const addMinutes=(v,m)=>{const d=new Date(v); if(!isFinite(d)) return ''; d.setMinutes(d.getMinutes()+(Number(m)||0)); return d.toISOString();};
const diffMin=(a,b)=>{if(!a||!b)return 0;const x=new Date(a),y=new Date(b);const m=Math.round((y-x)/60000);return isFinite(m)&&m>0?m:0};
const minText=m=>{m=Math.max(0,Math.round(Number(m)||0));const d=Math.floor(m/1440),h=Math.floor((m%1440)/60),r=m%60;if(d)return `${d} d ${h} h`;if(h)return `${h} h ${r} m`;return `${r} m`};
const toast=(t,bad)=>{const x=$('toast');x.textContent=t;x.style.background=bad?'#b83232':'#0A4033';x.classList.add('show');setTimeout(()=>x.classList.remove('show'),3000)};
let state={projectId:'',from:monthStart(),to:today(),project:{},logs:[],tickets:[],tab:'summary'};
function decodeUrl(){const q=new URLSearchParams(location.search);return {projectId:q.get('p')||q.get('project_id')||q.get('project')||q.get('id')||'',token:q.get('token')||q.get('t')||''}}
async function findProject(projectId,token){
  if(projectId){const r=await sb.from('projects').select('*').eq('id',projectId).maybeSingle(); if(r.data)return r.data;}
  if(token){for(const col of ['client_token','portal_token','public_token','client_portal_token']){try{const r=await sb.from('projects').select('*').eq(col,token).maybeSingle();if(r.data)return r.data;}catch(_){}}}
  return null;
}
async function loadPortal(){try{const p=decodeUrl();state.projectId=p.projectId;state.project=await findProject(p.projectId,p.token)||{};if(!state.project?.id&&!state.projectId)throw new Error('رابط المشروع غير مكتمل');state.projectId=String(state.project.id||state.projectId);await loadData();render()}catch(e){$('app').className='container loading';$('app').innerHTML=`<div class="loading-card"><img src="tasneef_logo_print.png"><h2>تعذر فتح بوابة العميل</h2><p>${esc(e.message||e)}</p></div>`}}
async function loadData(){
  state.logs=[]; state.tickets=[];
  try{const r=await sb.rpc('tasneef_client_portal_clean_v475',{p_project_id:String(state.projectId),p_from:state.from||null,p_to:state.to||null}); if(r.error)throw r.error; const d=r.data||{}; state.project=d.project||state.project||{}; state.logs=Array.isArray(d.logs)?d.logs:[]; state.tickets=Array.isArray(d.tickets)?d.tickets:[]; return;}catch(e){console.warn('RPC v475 failed, fallback direct',e)}
  try{let q=sb.from('time_logs').select('*').eq('project_id',state.projectId).limit(3000); if(state.from)q=q.gte('log_date',state.from); if(state.to)q=q.lte('log_date',state.to); const r=await q; state.logs=r.data||[]}catch(_){state.logs=[]}
  try{let q=sb.from('tickets').select('*').eq('project_id',state.projectId).order('created_at',{ascending:false}).limit(1000); const r=await q; state.tickets=r.data||[]}catch(_){state.tickets=[]}
}
function projectName(){return state.project.name||state.project.project_name||state.project.title||'مشروع العميل'}
function requiredMinutes(log){return num(log.required_minutes||log.required_daily_minutes||log.required_time_minutes||state.project.required_daily_minutes||state.project.required_minutes||state.project.time_required_minutes||0)}
function logDate(log){return log.log_date||log.date||dateOnly(log.check_in||log.created_at)}
function checkIn(log){return log.check_in||log.time_in||log.start_time||log.entry_time||''}
function checkOut(log){return log.check_out||log.time_out||log.end_time||log.exit_time||''}
function timeStatus(log){const req=requiredMinutes(log);const cin=checkIn(log),cout=checkOut(log);if(!cin)return {label:'-',cls:'blue',actual:0,expected:''};if(!cout){return {label:'لم يسجل خروج',cls:'amber',actual:0,expected:req?addMinutes(cin,req):''}}const actual=diffMin(cin,cout);if(!req)return {label:'تم التسجيل',cls:'green',actual,expected:''};if(actual<=req)return {label:'ضمن الوقت',cls:'green',actual,expected:''};return {label:'زيادة عن الوقت',cls:'blue',actual,expected:''}}
function workerList(log){const raw=log.distribution_workers||log.workers||log.worker_names||log.assigned_workers||'';let arr=[];if(Array.isArray(raw))arr=raw;else if(typeof raw==='string'){try{const x=JSON.parse(raw);arr=Array.isArray(x)?x:raw.split(/[,،\n]+/)}catch(_){arr=raw.split(/[,،\n]+/)}}return arr.map(x=>String(typeof x==='object'?(x.name||x.worker_name||x.label||''):x).trim()).filter(Boolean)}
function ticketNo(t){return t.ticket_number||t.ticket_no||(t.id?`T-${String(t.id).padStart(4,'0')}`:'-')}
function ticketType(t){const v=t.type||t.category||t.issue_type||t.title||t.subject||'تذكرة';const s=String(v).trim();if(/كهرب/i.test(s))return 'كهرباء';if(/سباك|مياه|صرف/i.test(s))return 'سباكة';if(/نظاف/i.test(s))return 'نظافة';if(/مصعد/i.test(s))return 'مصاعد';if(/صيان/i.test(s))return 'صيانة';return s.split(/[-–:|،,]/)[0].trim()||'تذكرة'}
function statusKey(s){s=norm(s||'open');if(/closed|مغلق|مغلقه|منتهي/.test(s))return 'closed';if(/pending|request|تحت الطلب|معل/.test(s))return 'pending';if(/progress|process|معالج|قيد|reopened/.test(s))return 'processing';return 'open'}
function statusLabel(s){const k=statusKey(s);return k==='closed'?'مغلقة':k==='pending'?'تحت الطلب':k==='processing'?'تحت المعالجة':'مفتوحة'}
function statusCls(s){const k=statusKey(s);return k==='closed'?'green':k==='open'?'red':'amber'}
function closeDate(t){return t.closed_at||t.close_date||t.closed_date||t.resolved_at||''}
function ticketDuration(t){const start=t.created_at||t.opened_at||t.date||'';if(!start)return '-';const end=closeDate(t);if(statusKey(t.status)==='closed'&&end)return minText(diffMin(start,end));return minText(diffMin(start,new Date().toISOString()))}
function stats(){const mins=state.logs.reduce((a,l)=>a+(timeStatus(l).actual||0),0);return {logs:state.logs.length,ticketsOpen:state.tickets.filter(t=>statusKey(t.status)!=='closed').length,tickets:state.tickets.length,hours:minText(mins)}}
function render(){const s=stats();$('app').className='container';$('app').innerHTML=`
  <section class="hero"><div class="hero-top"><div class="logo"><img src="tasneef_logo_print.png"><div><b>شركة تصنيف لإدارة المرافق</b><br><small>بوابة العميل</small></div></div><span class="pill">${esc(projectName())}</span></div><h1>بوابة مشروع ${esc(projectName())}</h1><p>متابعة التسجيلات اليومية والتذاكر الخاصة بالمشروع.</p></section>
  <section class="card"><h2>فلترة التقرير</h2><div class="filters"><div><label>من تاريخ</label><input type="date" id="fromDate" value="${esc(state.from)}"></div><div><label>إلى تاريخ</label><input type="date" id="toDate" value="${esc(state.to)}"></div><button onclick="applyFilter()">تطبيق الفلتر</button></div></section>
  <section class="stats"><div class="stat"><small>ساعات العمل</small><b>${esc(s.hours)}</b></div><div class="stat"><small>عدد التسجيلات</small><b>${s.logs}</b></div><div class="stat"><small>التذاكر المفتوحة</small><b>${s.ticketsOpen}</b></div><div class="stat"><small>إجمالي التذاكر</small><b>${s.tickets}</b></div><div class="stat"><small>المشروع</small><b style="font-size:17px">${esc(projectName())}</b></div></section>
  <div class="tabs"><button class="tab ${state.tab==='summary'?'active':''}" onclick="switchTab('summary')">الملخص</button><button class="tab ${state.tab==='logs'?'active':''}" onclick="switchTab('logs')">التسجيلات اليومية</button><button class="tab ${state.tab==='tickets'?'active':''}" onclick="switchTab('tickets')">التذاكر</button></div>
  <div id="content">${renderTab()}</div><div class="foot">تم إنشاء هذا التقرير من نظام شركة تصنيف لإدارة المرافق ويعتبر معتمدًا ما لم يرد خلاف ذلك.</div>`}
function renderTab(){if(state.tab==='logs')return logsHtml();if(state.tab==='tickets')return ticketsHtml();return summaryHtml()}
function switchTab(t){state.tab=t;render()}
async function applyFilter(){state.from=$('fromDate').value||'';state.to=$('toDate').value||'';await loadData();render()}
function summaryHtml(){return `<section class="card"><h2>الملخص</h2><p>عدد التسجيلات: <b>${state.logs.length}</b></p><p>عدد التذاكر: <b>${state.tickets.length}</b></p></section>`+logsHtml()+ticketsHtml()}
function logsHtml(){const rows=state.logs.map(l=>{const st=timeStatus(l);const workers=workerList(l);return `<tr><td>${esc(fmtD(logDate(l)))}</td><td>${esc(l.supervisor_name||l.supervisor||'-')}</td><td>${esc(l.project_name||projectName())}</td><td>${esc(l.visit_type||l.service_type||'-')}</td><td>${esc(fmtDT(checkIn(l)))}</td><td>${checkOut(l)?esc(fmtDT(checkOut(l))):'-'}</td><td>${st.expected?esc(fmtDT(st.expected)):'-'}</td><td>${requiredMinutes(l)?esc(minText(requiredMinutes(l))):'-'}</td><td>${st.actual?esc(minText(st.actual)):'-'}</td><td><span class="badge ${st.cls}">${esc(st.label)}</span></td><td class="workers">${workers.length?workers.map(w=>`<span>${esc(w)}</span>`).join(''):'-'}</td></tr>`}).join('');return `<section class="card"><h2>التسجيلات اليومية</h2>${rows?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>المشرف</th><th>المشروع</th><th>نوع الزيارة</th><th>الدخول</th><th>الخروج الفعلي</th><th>الخروج التقديري</th><th>الوقت المطلوب</th><th>المدة</th><th>الحالة</th><th>عمال التوزيع</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تسجيلات في الفترة المختارة.</div>'}</section>`}
function ticketsHtml(){const rows=state.tickets.map(t=>`<tr><td><b>${esc(ticketNo(t))}</b></td><td><b>${esc(ticketType(t))}</b></td><td><span class="badge ${statusCls(t.status)}">${esc(statusLabel(t.status))}</span></td><td>${esc(ticketDuration(t))}</td><td>${esc(fmtDT(t.created_at||t.opened_at||t.date))}</td><td>${esc(closeDate(t)?fmtDT(closeDate(t)):'-')}</td></tr>`).join('');return `<section class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap"><h2>التذاكر الخاصة بالمشروع</h2><button onclick="openTicketModal()">رفع تذكرة</button></div>${rows?`<div class="table-wrap"><table><thead><tr><th>رقم التذكرة</th><th>نوع التذكرة</th><th>حالة التذكرة</th><th>مدة التذكرة</th><th>تاريخ الفتح</th><th>تاريخ الإغلاق</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تذاكر لهذا المشروع.</div>'}</section>`}
function openTicketModal(){$('ticketModal').classList.add('show')}
function closeTicketModal(){$('ticketModal').classList.remove('show')}
async function submitClientTicket(){const type=$('ticketType').value,title=$('ticketTitle').value.trim()||type,loc=$('ticketLocation').value.trim(),desc=$('ticketDesc').value.trim();try{let r=await sb.rpc('tasneef_client_create_ticket_v475',{p_project_id:String(state.projectId),p_type:type,p_title:title,p_description:desc,p_location:loc});if(r.error)throw r.error;closeTicketModal();toast('تم رفع التذكرة');await loadData();state.tab='tickets';render()}catch(e){console.warn(e);try{const ins=await sb.from('tickets').insert({project_id:Number(state.projectId)||state.projectId,project_name:projectName(),type,title,description:[desc,loc?('الموقع: '+loc):''].filter(Boolean).join('\n'),status:'open',created_at:new Date().toISOString()});if(ins.error)throw ins.error;closeTicketModal();toast('تم رفع التذكرة');await loadData();state.tab='tickets';render()}catch(err){toast('تعذر رفع التذكرة: '+(err.message||err),true)}}}
</script>
</body>
</html>
