erflow:auto;background:#fff;border-radius:30px;box-shadow:0 35px 95px rgba(0,0,0,.32)}.modal-head{position:sticky;top:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:2}.modal-head h2{margin:0;color:#fff}.modal-head small{color:#dff1eb}.modal-body{padding:20px}.toast{position:fixed;bottom:18px;right:18px;background:#0A4033;color:#fff;padding:12px 16px;border-radius:16px;box-shadow:0 16px 35px rgba(0,0,0,.2);z-index:1200;display:none}.toast.show{display:block}.img-modal{z-index:1100;background:rgba(0,0,0,.9)}.img-modal .modal-card{background:transparent;border:0;box-shadow:none;display:grid;place-items:center}.img-modal img{max-width:100%;max-height:78vh;background:#fff;border-radius:18px;object-fit:contain}.img-tools{display:flex;justify-content:space-between;align-items:center;width:100%;color:#fff;margin-bottom:10px}.report-detail-card{width:min(520px,96vw)!important}.report-shell{max-width:460px;margin:0 auto;padding:4px 0 10px}.report-brand{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.report-brand .logo{display:flex;align-items:center;gap:10px}.report-brand img{width:76px;height:52px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:16px;padding:6px}.report-brand b{display:block;color:#0b2c5c;font-size:18px;line-height:1.5}.report-brand small{color:#b88b35;font-size:12px}.report-main-title{text-align:center;margin:8px 0 14px}.report-main-title h1{margin:0;color:#0b2c5c;font-size:22px}.report-main-title .project-name{color:#b88b35;font-weight:900;font-size:18px;margin-top:8px}.report-main-title .line{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px}.report-main-title .line span{display:block;width:54px;height:2px;background:#d9b66b;border-radius:999px}.report-main-title .line i{width:7px;height:7px;background:#d9b66b;border-radius:50%;displ :1.9}.report-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.report-actions button{border-radius:16px;padding:14px 16px}.report-actions .print-btn{background:#fff;color:#0b2c5c;border:1px solid #113b72}.report-footer-note{text-align:center;color:#60706a;font-size:13px;line-height:1.9;margin-top:18px}.report-nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.report-nav button{border-radius:16px;padding:12px 14px;box-shadow:none}.report-nav .light{border:1px solid var(--line)}@media(max-width:1000px){.top{display:block}.hero-actions,.stats,.grid,.service-gates,.images,.form-grid,.filters{grid-template-columns:1fr}.hero h1{font-size:27px}.hero-action{min-height:auto}table{font-size:13px}.modal-head{align-items:flex-start}.img-card img{height:auto;max-height:520px}}@media(max-width:560px){.modal{padding:0}.modal-card{width:100vw;max-height:100vh;border-radius:0}.modal-head{border-radius:0}.report-detail-card{width:100vw!important;max-height:100vh;border-radius:0}.report-shell{max-width:100%;padding:0}.report-brand b{font-size:17px}.report-main-title h1{font-size:20px}.report-main-title .project-name{font-size:16px}.report-meta{grid-template-columns:repeat(2,1fr)}.meta-box{min-height:82px}.report-actions,.report-nav{grid-template-columns:1fr}}@media print{.hero-actions,.filters,.tabs,button,.modal-head,.modal{display:none!important}.hero,.card{box-shadow:none}.container{width:100%}}

<div id="app" class="container loading"><div class="loading-card"><img src="tasneef_logo_print.png" alt="شركة تصنيف"><h2>شركة تصنيف لإدارة المرافق</h2><p>نجهّز تقرير مشروعكم الآن...</p><div class="spinner"></div></div></div>
<div id="mainModal" class="modal" onclick="backdropClose(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-head"><div><h2 id="modalTitle">بوابة العميل</h2><small id="modalSub">متابعة المشروع</small></div><button class="light" onclick="closeModal()">إغلاق</button></div><div id="modalBody" class="modal-body"></div></div></div>

<script>
const SUPABASE_URL = "https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const E=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let portal={projectId:'',projectName:'',from:'',to:'',project:null,smart:null,reports:[],services:[],tickets:[],timeLogs:[],ratings:[],rating:0};
function toast(t,err){const x=$('toast');x.textContent=t;x.style.background=err?'#b83232':'#0A4033';x.classList.add('show');setTimeout(()=>x.classList.remove('show'),3200)}
function today(){return new Date().toISOString().slice(0,10)}
function monthStart(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}
function dateOnly(v){return String(v||'').slice(0,10)}
function inRange(v,from,to){const d=dateOnly(v);return(!from||d>=from)&&(!to||d<=to)}
function latinDigits(v){return String(v??'').replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d))}
function n(v){return latinDigits(v)}
function fmt(v){try{return v?latinDigits(new Date(v).toLocaleString('en-GB',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true})).replace(',', ''):'-'}catch(e){return latinDigits(String(v||'-'))}}
function fmtDate(v){try{return v?latinDigits(new Date(v).toLocaleDateString('en-GB',{year:'numeric',month:'2-digit',day:'2-digit'})):'-'}catch(e){return latinDigits(String(v||'-'))}}
function minutesBetween(a,b){if(!a||!b)return 0;const x=new Date(a),y=new Date(b);const m=Math.round((y-x)/60000);return isFinite(m)&&m>0?m:0}
function minToHr(m){m=Number(m)||0;const h=Math.floor(m/60),r=m%60;return h?`${n(h)} س ${n(r)} د`:`${n(r)} د`}
function daysLeft(v){if(!v)return '-';const d=new Date(String(v).slice(0,10)+'T23:59:59');const now=new Date();const x=Math.ceil((d-now)/86400000);return isFinite(x)?(x<0?'منتهي':n(x)+' يوم'):'-'}
function smartPayload(x){try{return x&&x.payload?x.payload:{annual:[]}}catch(e){return {annual:[]}}}
function annualRows(){const annual=(portal.smart?.annual||[]);return annual.map(a=>{const visits=Number(a.visits)||0;const done=Array.isArray(a.done)?a.done.length:0;return {name:a.name||'-',visits:n(visits),done:n(done),remain:n(Math.max(0,visits-done)),status:done>=visits?'مكتمل':(done>0?'جاري':'لم يبدأ'),notes:a.notes||''}})}
function annualDoneCount(){return annualRows().reduce((a,r)=>a+(Number(r.done)||0),0)}
function annualRemainCount(){return annualRows().reduce((a,r)=>a+(Number(r.remain)||0),0)}
function decodeToken(){const u=new URL(location.href);let t=u.searchParams.get('token');if(!t){return {project_id:u.searchParams.get('project')||u.searchParams.get('project_id'),from:u.searchParams.get('from')||monthStart(),to:u.searchParams.get('to')||today()};}try{t=t.replace(/-/g,'+').replace(/_/g,'/');while(t.length%4)t+='=';return JSON.parse(decodeURIComponent(escape(atob(t))))}catch(e){return {project_id:null,from:monthStart(),to:today()}}}
function reportTitle(r){return r?.title||r?.report_title||r?.report_no||'تقرير مشروع'}
function serviceName(s){return s?.title||s?.service_title||s?.service_type||'خدمة منفذة'}
function ticketNo(t){return n(t?.ticket_number||t?.ticket_no||(t?.id?('T-'+String(t.id).padStart(4,'0')):'-'))}
function statusLabel(s){return ({open:'مفتوحة',processing:'تحت المعالجة',in_progress:'تحت المعالجة',pending:'تحت المعالجة',reopened:'تحت المعالجة',closed:'مغلقة'}[String(s||'open')]||'مفتوحة')}
function statusClass(s){return String(s||'open')==='closed'?'green':(['processing','in_progress','pending','reopened'].includes(String(s||''))?'amber':'red')}
function asImages(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);try{const x=JSON.parse(v);return Array.isArray(x)?x.filter(Boolean):[]}catch(e){return[]}}
function getSrc(x){return typeof x==='string'?x:(x?.url||x?.data||x?.src||'')}
function before(s){return asImages(s.before_images||s.images_before)}function during(s){return asImages(s.during_images||s.images_during)}function after(s){return asImages(s.after_images||s.images_after||s.after)}
function imgCount(s){return before(s).length+during(s).length+after(s).length}
function serviceIcon(t){t=String(t||'');if(t.includes('حشر'))return'🛡️';if(t.includes('خزان'))return'💧';if(t.includes('كهرب'))return'💡';if(t.includes('سباك'))return'🔧';if(t.includes('نظاف'))return'🧹';if(t.includes('مصعد'))return'🛗';return'✅'}
async function loadPortal(){try{const payload=decodeToken();portal.projectId=payload.project_id||payload.projectId;portal.from=payload.from||monthStart();portal.to=payload.to||today();if(!portal.projectId)throw new Error('رابط العميل غير مكتمل. لا يوجد مشروع مرتبط بالرابط.');await loadData();renderHome()}catch(e){$('app').className='container loading';$('app').innerHTML=`<div class="loading-card"><img src="tasneef_logo_print.png"><h2>تعذر فتح بوابة العميل</h2><p>${E(e.message||String(e))}</p></div>`}}
async function loadData(){
  const pr=await sb.from('projects').select('*').eq('id',portal.projectId).maybeSingle();portal.project=pr.data||{};portal.projectName=portal.project.name||'مشروع العميل';try{const sm=await sb.from('project_contract_smart').select('*').eq('project_id',portal.projectId).maybeSingle();portal.smart=smartPayload(sm.data)}catch(e){portal.smart={annual:[]}}
  let logsQ=sb.from('time_logs').select('*').eq('project_id',portal.projectId).order('check_in',{ascending:false}).limit(5000);if(portal.from)logsQ=logsQ.gte('log_date',portal.from);if(portal.to)logsQ=logsQ.lte('log_date',portal.to);
  let ticQ=sb.from('tickets').select('*').eq('project_id',portal.projectId).order('created_at',{ascending:false}).limit(1000);if(portal.from)ticQ=ticQ.gte('created_at',portal.from+'T00:00:00');if(portal.to)ticQ=ticQ.lte('created_at',portal.to+'T23:59:59');
  let repQ=sb.from('client_reports').select('*').eq('project_id',portal.projectId).order('report_date',{ascending:false}).limit(500);if(portal.from)repQ=repQ.gte('report_date',portal.from);if(portal.to)repQ=repQ.lte('report_date',portal.to);
  const [logs,tickets,reports]=await Promise.all([logsQ,ticQ,repQ]);portal.timeLogs=logs.data||[];portal.tickets=tickets.data||[];portal.reports=reports.data||[];
  // V467: إذا منعت RLS أو اختلاف الأعمدة ظهور التسجيلات/التذاكر، نقرأها عبر RPC آمن من السيرفر.
  try{
    const rr=await sb.rpc('tasneef_client_portal_records_v468',{p_project_id:String(portal.projectId),p_from:portal.from||null,p_to:portal.to||null});
    if(!rr.error && rr.data){
      const obj=(typeof rr.data==='string')?JSON.parse(rr.data):rr.data;
      if(Array.isArray(obj.logs) && obj.logs.length) portal.timeLogs=obj.logs;
      if(Array.isArray(obj.tickets) && obj.tickets.length) portal.tickets=obj.tickets;
    }
  }catch(_){ }
  const ids=portal.reports.map(r=>r.id).filter(Boolean);portal.services=[];if(ids.length){try{const sr=await sb.from('client_report_services').select('*').in('report_id',ids).order('id',{ascending:true});portal.services=sr.data||[]}catch(e){}}
  try{let rt=sb.from('client_service_ratings').select('*').eq('project_id',portal.projectId).order('created_at',{ascending:false}).limit(100);if(portal.from)rt=rt.gte('created_at',portal.from+'T00:00:00');if(portal.to)rt=rt.lte('created_at',portal.to+'T23:59:59');const rr=await rt;portal.ratings=rr.data||[]}catch(e){portal.ratings=[]}
}
function stats(){const minutes=portal.timeLogs.reduce((a,l)=>a+(Number(l.duration_minutes)||minutesBetween(l.check_in,l.check_out)),0);const days=new Set(portal.timeLogs.map(l=>dateOnly(l.log_date||l.check_in)).filter(Boolean)).size;const open=portal.tickets.filter(t=>String(t.status||'open')!=='closed').length;const nums=portal.ratings.map(r=>Number(r.score||({'ممتاز':5,'جيد جدًا':4,'جيد':3,'يحتاج تحسين':2}[r.rating]||0))).filter(Boolean);const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):'-';return{minutes,days,open,closed:portal.tickets.length-open,avg,annualDone:annualDoneCount(),annualRemain:annualRemainCount(),contractLeft:daysLeft(portal.project.contract_end||portal.project.end_date)}}

  function logsHtmlV466(){
    const rows=(portal.timeLogs||[]).map(l=>{ const m=logMeta(l); const outText=m.hasOut?fmtSafe(m.out):(m.expected?`تقديري: ${fmtSafe(m.expected)}`:'-'); return `<tr><td>${E2(dateOnly2(l.log_date||m.checkIn))}</td><td>${E2(fmtSafe(m.checkIn))}</td><td>${E2(outText)}</td><td>${E2(minText(m.required))}</td><td>${E2(minText(m.actual))}</td><td><span class="badge ${m.cls}">${E2(m.label)}</span><br><small>${E2(m.details)}</small></td><td>${E2(l.notes||'-')}</td></tr>`; }).join('');
    return `<section class="card"><h2>التسجيلات اليومية</h2>${rows?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>الدخول</th><th>الخروج / المتوقع</th><th>الوقت المطلوب</th><th>المدة</th><th>حالة الوقت</th><th>ملاحظات</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تسجيلات يومية ضمن الفترة المحددة.</div>'}</section>`;
  }
  function ticketsHtmlV466(){
    const rows=(portal.tickets||[]).map(x=>`<tr><td><b>${E2((x.ticket_number||x.ticket_no||(x.id?('T-'+String(x.id).padStart(4,'0')):'-')))}</b></td><td><b>${E2(x.title||x.ticket_title||x.type||'تذكرة مشروع')}</b><br><small>${E2(x.description||'')}</small></td><td><span class="badge ${String(x.status||'open')==='closed'?'green':(String(x.status||'')==='processing'||String(x.status||'')==='in_progress'?'amber':'red')}">${E2(({open:'مفتوحة',processing:'قيد التنفيذ',in_progress:'قيد التنفيذ',closed:'مغلقة',pending:'معلقة',reopened:'معاد فتحها'}[String(x.status||'open')]||x.status||'مفتوحة'))}</span></td><td>${E2(fmtSafe(x.created_at))}</td><td>${E2(x.closed_at?fmtSafe(x.closed_at):'-')}</td></tr>`).join('');
    return `<section class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><h2 style="margin:0">التذاكر الخاصة بالمشروع</h2><button onclick="openClientTicketFormV466()">رفع تذكرة</button></div><p style="color:#60706a;line-height:1.8">يمكنكم رفع تذكرة مرتبطة تلقائيًا بهذا المشروع، وستظهر مباشرة لدى الإدارة.</p>${rows?`<div class="table-wrap"><table style="min-width:760px"><thead><tr><th>رقم التذكرة</th><th>عنوان التذكرة</th><th>الحالة</th><th>تاريخ الفتح</th><th>تاريخ الإغلاق</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تذاكر ضمن الفترة المحددة.</div>'}</section>`;
  }
  function ticketFormHtml(){return `<div class="form-grid"><div><label>نوع المشكلة</label><select id="clientTicketTypeV466"><option>صيانة</option><option>نظافة</option><option>مياه</option><option>كهرباء</option><option>مصاعد</option><option>أخرى</option></select></div><div><label>رقم الوحدة / الموقع</label><input id="clientTicketLocationV466" placeholder="مثال: شقة 12 / البيسمنت / المدخل"></div></div><label>عنوان التذكرة</label><input id="clientTicketTitleV466" placeholder="اكتب عنوان مختصر للتذكرة"><label>وصف المشكلة</label><textarea id="clientTicketDescV466" rows="5" placeholder="اكتب تفاصيل المشكلة"></textarea><button onclick="submitClientTicketV466(this)">إرسال التذكرة</button>`;}
  G.openClientTicketFormV466=function(){ if(typeof G.openModal==='function') G.openModal('رفع تذكرة',portal.projectName||'المشروع',ticketFormHtml()); };
  G.submitClientTicketV466=async function(btn){
    try{
      const title=String($('clientTicketTitleV466')?.value||'').trim();
      const desc=String($('clientTicketDescV466')?.value||'').trim();
      const type=String($('clientTicketTypeV466')?.value||'أخرى').trim();
      const loc=String($('clientTicketLocationV466')?.value||'').trim();
      if(!title) throw new Error('اكتب عنوان التذكرة');
      if(btn){btn.disabled=true;btn.textContent='جاري الإرسال...';}
      let inserted=null, err=null;
      if(G.sb){
        try{
          const r=await G.sb.rpc('tasneef_client_create_ticket_v466',{p_project_id:String(portal.projectId),p_title:title,p_description:desc,p_type:type,p_location:loc,p_client_name:'عميل المشروع',p_client_contact:''});
          if(r.error) throw r.error;
          inserted=Array.isArray(r.data)?r.data[0]:r.data;
        }catch(e){ err=e; try{ const d=await G.sb.from('tickets').insert({project_id:Number(portal.projectId)||portal.projectId,title,description:[desc,loc?('الموقع: '+loc):'',type?('النوع: '+type):''].filter(Boolean).join('\n'),status:'open',created_at:new Date().toISOString()}).select('*').single(); if(d.error) throw d.error; inserted=d.data; err=null; }catch(e2){ err=e2; } }
      }
      if(err) throw err;
      if(inserted) portal.tickets=[inserted,...(portal.tickets||[])];
      if(typeof G.toast==='function') G.toast('تم رفع التذكرة بنجاح');
      if(typeof G.closeModal==='function') G.closeModal();
      if(typeof G.showMain==='function') G.showMain('tickets');
    }catch(e){ if(typeof G.toast==='function') G.toast(e.message||String(e),true); else alert(e.message||String(e)); }
    finally{ if(btn){btn.disabled=false;btn.textContent='إرسال التذكرة';} }
  };
  const oldStats=G.stats;
  G.stats=function(){ const s=oldStats?oldStats():{}; const mins=(portal.timeLogs||[]).reduce((a,l)=>a+(logMeta(l).actual||0),0); if(mins>=0) s.minutes=mins; return s; };
  G.logsHtml=logsHtmlV466;
  G.ticketsHtml=ticketsHtmlV466;
  const oldShow=G.showMain;
  G.showMain=function(tab){
    const box=$('mainContent'); if(!box || !oldShow) return oldShow&&oldShow(tab);
    if(tab==='logs' || tab==='tickets'){
      const tabs=`<div class="tabs"><button class="tab ${tab==='summary'?'active':''}" onclick="showMain('summary')">الملخص</button><button class="tab ${tab==='logs'?'active':''}" onclick="showMain('logs')">التسجيلات اليومية</button><button class="tab ${tab==='works'?'active':''}" onclick="showMain('works')">الأعمال المنفذة</button><button class="tab ${tab==='tickets'?'active':''}" onclick="showMain('tickets')">التذاكر</button><button class="tab ${tab==='rating'?'active':''}" onclick="showMain('rating')">التقييم</button></div>`;
      box.innerHTML=tabs+(tab==='logs'?logsHtmlV466():ticketsHtmlV466());
      return;
    }
    return oldShow(tab);
  };
  const oldRender=G.renderHome;
  if(oldRender){ G.renderHome=function(){ oldRender(); setTimeout(()=>{ try{ const hero=document.querySelector('.hero-actions'); if(hero && !document.getElementById('clientTicketHeroV466')){ const d=document.createElement('div'); d.id='clientTicketHeroV466'; d.className='hero-action'; d.onclick=()=>G.openClientTicketFormV466(); d.innerHTML='<div class="ico">📝</div><h3>رفع تذكرة</h3><p>إرسال بلاغ أو ملاحظة للإدارة مرتبطة بهذا المشروع.</p>'; hero.appendChild(d); } }catch(_){} },50); }; }
})();
</script>


<script>
/* V468 - بوابة العميل: مدة التذاكر + إقفال الخروج المفقود حسب وقت المشروع */
(function(){
  'use strict';
  if(window.__tasneefClientPortalV468) return;
  window.__tasneefClientPortalV468 = true;
  const G=window;
  const $=id=>document.getElementById(id);
  const E=v=>String(v??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const N=v=>Number(String(v??'').replace(/,/g,''))||0;
  const fmtSafe=v=>{try{return v?new Date(v).toLocaleString('ar-SA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'numeric',minute:'2-digit'}):'-';}catch(_){return v||'-';}};
  const minText=m=>{m=Math.max(0,Math.round(N(m)));const h=Math.floor(m/60),r=m%60;return h?`${h} س ${r} د`:`${r} د`;};
  function diff(a,b){const x=new Date(a),y=new Date(b);const m=Math.round((y-x)/60000);return isFinite(m)&&m>0?m:0;}
  function rawStatus(s){s=String(s||'open'); if(['closed','مغلق','مغلقة'].includes(s)) return 'closed'; if(['pending','requested','request','under_request','تحت الطلب','معلقة'].includes(s)) return 'pending'; if(['processing','in_progress','قيد التنفيذ','تحت المعالجة'].includes(s)) return 'processing'; return 'open';}
  function ticketStatusLabel(s){const x=rawStatus(s); return x==='closed'?'مغلقة':x==='pending'?'تحت الطلب':x==='processing'?'تحت المعالجة':'مفتوحة';}
  function ticketStatusClass(s){const x=rawStatus(s); return x==='closed'?'green':x==='pending'?'amber':x==='processing'?'amber':'red';}
  function ticketNumber(t){return t.ticket_number||t.ticket_no||(t.id?('T-'+String(t.id).padStart(4,'0')):'-');}
  function ticketAge(t){const start=t.created_at||t.opened_at||t.date||''; const end=t.closed_at||t.close_date||t.closed_date||t.resolved_at||t.updated_at||''; if(!start)return '-'; if(rawStatus(t.status)==='closed'&&end)return 'استغرق الإقفال: '+minText(diff(start,end)); return 'مفتوحة منذ: '+minText(diff(start,new Date().toISOString()));}
  function ticketsHtmlV468(){
    const rows=(portal.tickets||[]).map(x=>`<tr><td><b>${E(ticketNumber(x))}</b></td><td><b>${E(x.title||x.ticket_title||x.type||'تذكرة مشروع')}</b><br><small>${E(x.description||'')}</small></td><td><span class="badge ${ticketStatusClass(x.status)}">${E(ticketStatusLabel(x.status))}</span></td><td>${E(ticketAge(x))}</td><td>${E(fmtSafe(x.created_at))}</td><td>${E((rawStatus(x.status)==='closed'&&(x.closed_at||x.close_date||x.resolved_at))?fmtSafe(x.closed_at||x.close_date||x.resolved_at):'-')}</td></tr>`).join('');
    return `<section class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><h2 style="margin:0">التذاكر الخاصة بالمشروع</h2><button onclick="openClientTicketFormV466()">رفع تذكرة</button></div>${rows?`<div class="table-wrap"><table style="min-width:860px"><thead><tr><th>رقم التذكرة</th><th>عنوان التذكرة</th><th>حالة التذكرة</th><th>مدة التذكرة</th><th>تاريخ الفتح</th><th>تاريخ الإغلاق</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تذاكر ضمن الفترة المحددة.</div>'}</section>`;
  }
  G.ticketsHtml=ticketsHtmlV468;
  const oldShow=G.showMain;
  G.showMain=function(tab){
    if(tab==='tickets'){
      const box=$('mainContent'); if(!box) return oldShow&&oldShow(tab);
      const tabs=`<div class="tabs"><button class="tab ${tab==='summary'?'active':''}" onclick="showMain('summary')">الملخص</button><button class="tab ${tab==='logs'?'active':''}" onclick="showMain('logs')">التسجيلات اليومية</button><button class="tab ${tab==='works'?'active':''}" onclick="showMain('works')">الأعمال المنفذة</button><button class="tab ${tab==='tickets'?'active':''}" onclick="showMain('tickets')">التذاكر</button><button class="tab ${tab==='rating'?'active':''}" onclick="showMain('rating')">التقييم</button></div>`;
      box.innerHTML=tabs+ticketsHtmlV468(); return;
    }
    return oldShow&&oldShow.apply(this,arguments);
  };
})();
</script>
